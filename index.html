<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Life Admin | 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="./assets/js/api.js"></script>
    <style>
        .bg-gradient-custom {
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
        }
    </style>
</head>
<body class="bg-gradient-custom h-screen flex items-center justify-center font-sans text-gray-800">

    <div x-data="loginForm()" class="w-full max-w-md p-8 bg-white/70 backdrop-blur-xl rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white/50 relative overflow-hidden">
        
        <div class="absolute -top-20 -right-20 w-40 h-40 bg-teal-400 rounded-full mix-blend-multiply filter blur-2xl opacity-20"></div>
        <div class="absolute -bottom-20 -left-20 w-40 h-40 bg-blue-400 rounded-full mix-blend-multiply filter blur-2xl opacity-20"></div>

        <div class="relative z-10 text-center mb-10">
            <h1 class="text-3xl font-extrabold tracking-tight text-gray-900">Health Life</h1>
            <p class="text-sm text-gray-500 mt-2">后台管理系统</p>
        </div>

        <form @submit.prevent="submit" class="relative z-10 space-y-6">
            <template x-if="errorMsg">
                <div class="p-3 text-sm text-red-600 bg-red-50 rounded-xl border border-red-100 transition-all" x-text="errorMsg"></div>
            </template>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">用户名</label>
                <input type="text" x-model="username" required 
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none transition-all bg-white/50 text-gray-800 shadow-sm"
                    placeholder="请输入管理员账号">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">密码</label>
                <input type="password" x-model="password" required 
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none transition-all bg-white/50 text-gray-800 shadow-sm"
                    placeholder="••••••••">
            </div>

            <button type="submit" :disabled="loading"
                class="w-full py-3 px-4 bg-teal-600 hover:bg-teal-700 text-white rounded-xl font-medium shadow-lg shadow-teal-500/30 transition-all focus:ring-4 focus:ring-teal-500/20 disabled:opacity-70 disabled:cursor-not-allowed flex justify-center items-center">
                <span x-show="!loading">登录系统</span>
                <svg x-show="loading" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>
    </div>

    <script>
        function loginForm() {
            return {
                username: '',
                password: '',
                loading: false,
                errorMsg: '',
                async submit() {
                    this.loading = true;
                    this.errorMsg = '';
                    try {
                        // 调用 api.js 中的方法
                        const response = await window.API.login({
                            username: this.username,
                            password: this.password
                        });
                        
                        // ✅ 正确代码：兼容被 CustomRenderer 包装的 data 层
                        const responseData = response.data || response; // 兼容包装和未包装的情况

                        localStorage.setItem('access_token', responseData.token);
                        localStorage.setItem('refresh_token', responseData.refresh_token);
                        localStorage.setItem('user_info', JSON.stringify(responseData.user_info));
                        // 跳转到主控台框架 (阶段二目标)
                        window.location.href = 'layout.html';
                    } catch (err) {
                        this.errorMsg = err.message || '登录失败，请检查账号密码';
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
