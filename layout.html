<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Life | 管理控制台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="./assets/js/api.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* 隐藏 Iframe 默认边框，并确保其填满容器 */
        iframe {
            border: none;
            width: 100%;
            height: 100%;
        }
        /* 自定义滚动条美化 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans overflow-hidden flex h-screen" x-data="layoutApp()" x-init="initApp()">

    <aside class="w-64 bg-white shadow-[4px_0_24px_rgba(0,0,0,0.02)] flex flex-col z-20 relative">
        <div class="h-16 flex items-center px-6 border-b border-gray-100">
            <div class="w-8 h-8 bg-gradient-to-tr from-teal-400 to-teal-600 rounded-lg shadow-lg shadow-teal-500/30 flex items-center justify-center mr-3">
                <i data-lucide="leaf" class="text-white w-5 h-5"></i>
            </div>
            <span class="text-lg font-bold tracking-tight text-gray-800">Health Life</span>
        </div>

        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
            <template x-if="loadingMenus">
                <div class="animate-pulse space-y-3 px-2">
                    <div class="h-10 bg-gray-100 rounded-xl"></div>
                    <div class="h-10 bg-gray-100 rounded-xl"></div>
                    <div class="h-10 bg-gray-100 rounded-xl"></div>
                </div>
            </template>

            <template x-for="menu in menus" :key="menu.id">
                <div class="mb-2">
                    <div class="px-3 py-2 text-xs font-semibold text-gray-400 uppercase tracking-wider" x-text="menu.name"></div>
                    
                    <div class="space-y-1 mt-1">
                        <template x-for="child in menu.children" :key="child.id">
                            <a :href="child.path" target="content_frame"
                               @click="activePath = child.path"
                               :class="activePath === child.path 
                                    ? 'bg-teal-50 text-teal-600 shadow-sm' 
                                    : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'"
                               class="group flex items-center px-3 py-2.5 text-sm font-medium rounded-xl transition-all duration-200 cursor-pointer">
                                
                                <i data-lucide="circle-dot" class="w-4 h-4 mr-3 transition-colors"
                                   :class="activePath === child.path ? 'text-teal-500' : 'text-gray-400 group-hover:text-gray-600'"></i>
                                <span x-text="child.name"></span>
                            </a>
                        </template>
                    </div>
                </div>
            </template>
        </nav>

        <div class="p-4 border-t border-gray-100 bg-gray-50/50">
            <div class="flex items-center">
                <img :src="userInfo.avatar || 'https://ui-avatars.com/api/?name=Admin&background=0D8ABC&color=fff'" 
                     alt="Avatar" class="w-10 h-10 rounded-full shadow-sm border-2 border-white">
                <div class="ml-3 flex-1 overflow-hidden">
                    <p class="text-sm font-medium text-gray-900 truncate" x-text="userInfo.nickname || userInfo.username"></p>
                    <p class="text-xs text-gray-500 truncate" x-text="userInfo.roles?.[0]?.name || '超级管理员'"></p>
                </div>
                <button @click="logout" class="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors" title="退出登录">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col bg-[#f4f7f6] relative">
        <header class="h-16 bg-white/60 backdrop-blur-md border-b border-gray-200/50 flex items-center justify-between px-6 sticky top-0 z-10">
            <div class="flex items-center text-sm text-gray-500">
                <i data-lucide="layout-dashboard" class="w-4 h-4 mr-2 text-teal-500"></i>
                <span class="font-medium text-gray-700">工作台</span>
                <span class="mx-2">/</span>
                <span class="text-gray-400" x-text="currentMenuName">概览</span>
            </div>

            <div class="flex items-center space-x-4">
                <button class="text-gray-400 hover:text-gray-600 transition-colors relative">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                    <span class="absolute top-0 right-0 block h-2 w-2 rounded-full bg-red-400 ring-2 ring-white"></span>
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-hidden p-4 sm:p-6">
            <div class="w-full h-full bg-white rounded-2xl shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-gray-100 overflow-hidden relative">
                <iframe name="content_frame" id="content_frame" src="./pages/dashboard.html" @load="onIframeLoad"></iframe>
                
                <div x-show="iframeLoading" class="absolute inset-0 bg-white/80 backdrop-blur-sm flex justify-center items-center z-50 transition-opacity">
                    <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-teal-500"></i>
                </div>
            </div>
        </div>
    </main>

    <script>
        function layoutApp() {
            return {
                menus: [],
                userInfo: {},
                loadingMenus: true,
                iframeLoading: true,
                activePath: './pages/dashboard.html', // 默认激活路径
                
                get currentMenuName() {
                    // 动态计算当前展示的面包屑名称
                    for(let parent of this.menus) {
                        for(let child of parent.children || []) {
                            if(child.path === this.activePath) return child.name;
                        }
                    }
                    return '数据看板';
                },

                async initApp() {
                    // 1. 检查登录状态
                    const token = localStorage.getItem('access_token');
                    // ✅ 修改点：增加对 'undefined' 字符串的过滤
                    if (!token || token === 'undefined') {
                        window.location.href = 'index.html';
                        return;
                    }

                    // 获取本地用户信息
                    this.userInfo = JSON.parse(localStorage.getItem('user_info') || '{}');

                    try {
                        // 2. 获取动态菜单
                        const response = await window.API.getMenus();
                        // 假设后端返回的数据在 response.data 中
                        this.menus = response.data || [];
                    } catch (error) {
                        console.error("加载菜单失败", error);
                    } finally {
                        this.loadingMenus = false;
                        // 等待 DOM 更新后渲染图标
                        this.$nextTick(() => {
                            lucide.createIcons();
                        });
                    }
                },

                onIframeLoad() {
                    this.iframeLoading = false;
                    // Iframe 加载完成后，监听其中链接的跳转变化（如果是同域）
                    try {
                        const iframeWindow = document.getElementById('content_frame').contentWindow;
                        this.activePath = iframeWindow.location.pathname + iframeWindow.location.search;
                    } catch(e) { /* 忽略跨域报错 */ }
                },

                logout() {
                    if(confirm("确定要退出系统吗？")) {
                        localStorage.clear();
                        window.location.href = 'index.html';
                    }
                }
            }
        }

        // 监听 iframe 内部发送的改变 URL 事件 (便于内部页面控制外部菜单高亮)
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'CHANGE_ROUTE') {
                const iframe = document.getElementById('content_frame');
                iframe.src = event.data.path;
            }
        });
    </script>
</body>
</html>
