<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康补救方案管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/api.js"></script>
</head>
<body class="bg-gray-50 p-4 sm:p-8 text-gray-800 font-sans min-h-screen" x-data="remediesApp()" x-init="initData()">

    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 border-b border-gray-200 pb-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 flex items-center gap-2">
                <svg class="w-7 h-7 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                健康补救方案管理
            </h1>
            <p class="text-sm text-gray-500 mt-1">管理用户违规后的健康补救任务与积分消耗</p>
        </div>
        
        <div class="flex items-center gap-3 w-full sm:w-auto">
            <select x-model="searchScenario" @change="fetchData()" class="block w-full sm:w-48 pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-rose-500 focus:border-rose-500 sm:text-sm rounded-md shadow-sm border">
                <template x-for="scen in scenarios" :key="scen.value">
                    <option :value="scen.value" x-text="scen.label"></option>
                </template>
            </select>
            
            <button @click="openModal()" class="inline-flex items-center px-4 py-2 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-rose-600 hover:bg-rose-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-rose-500 transition-colors">
                <svg class="mr-2 -ml-1 h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                新增方案
            </button>
        </div>
    </div>

    <div class="bg-white shadow-sm rounded-lg overflow-hidden border border-gray-200">
        <div x-show="loading" class="p-8 text-center text-gray-500 animate-pulse">
            数据加载中...
        </div>

        <table class="min-w-full divide-y divide-gray-200" x-show="!loading">
            <thead class="bg-gray-50">
                <tr>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">触发场景</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">方案标题</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">消耗积分</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">排序优先级</th>
                    <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                <tr x-show="items.length === 0">
                    <td colspan="6" class="px-6 py-12 text-center text-gray-500">
                        当前场景下暂无补救方案数据
                    </td>
                </tr>
                
                <template x-for="item in items" :key="item.id">
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="item.id"></td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-blue-100 text-blue-800" x-text="getScenarioLabel(item.scenario)"></span>
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-900 font-medium">
                            <div x-text="item.title"></div>
                            <div class="text-xs text-gray-500 mt-1" x-text="item.description || item.desc"></div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-rose-600 font-bold" x-text="'- ' + item.points_cost"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="item.order"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <button @click="openModal(item)" class="text-indigo-600 hover:text-indigo-900 mr-4">编辑</button>
                            <button @click="deleteItem(item.id)" class="text-red-600 hover:text-red-900">删除</button>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <div x-show="isModalOpen" style="display: none;" class="fixed z-10 inset-0 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div x-show="isModalOpen" @click="closeModal()" x-transition.opacity class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            
            <div x-show="isModalOpen" x-transition class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <h3 class="text-lg leading-6 font-medium text-gray-900 mb-5" id="modal-title" x-text="isEditing ? '编辑补救方案' : '新增补救方案'"></h3>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">触发场景</label>
                            <select x-model="formData.scenario" class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-rose-500 focus:border-rose-500 sm:text-sm rounded-md border">
                                <template x-for="scen in scenarios.filter(s => s.value !== '')" :key="scen.value">
                                    <option :value="scen.value" x-text="scen.label"></option>
                                </template>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">方案标题 <span class="text-red-500">*</span></label>
                            <input type="text" x-model="formData.title" placeholder="如：补水提醒" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-rose-500 focus:border-rose-500 sm:text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">详细描述 (description) <span class="text-red-500">*</span></label>
                            <textarea x-model="formData.description" rows="3" placeholder="如：先补 500ml 温水并暂停含糖饮料" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-rose-500 focus:border-rose-500 sm:text-sm"></textarea>
                        </div>
                        <div class="flex gap-4">
                            <div class="flex-1">
                                <label class="block text-sm font-medium text-gray-700">消耗积分 (points_cost)</label>
                                <input type="number" x-model.number="formData.points_cost" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-rose-500 focus:border-rose-500 sm:text-sm">
                            </div>
                            <div class="flex-1">
                                <label class="block text-sm font-medium text-gray-700">排序 (order)</label>
                                <input type="number" x-model.number="formData.order" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-rose-500 focus:border-rose-500 sm:text-sm">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                    <button type="button" @click="submitForm()" :disabled="submitting" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-rose-600 text-base font-medium text-white hover:bg-rose-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-rose-500 sm:ml-3 sm:w-auto sm:text-sm disabled:opacity-50">
                        <span x-show="!submitting">保存提交</span>
                        <span x-show="submitting">处理中...</span>
                    </button>
                    <button type="button" @click="closeModal()" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-rose-500 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">
                        取消
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function remediesApp() {
            return {
                items: [],
                loading: false,
                searchScenario: '',
                // 场景字典定义
                scenarios: [
                    { value: '', label: '全部场景' },
                    { value: 'overeat', label: '暴饮暴食' },
                    { value: 'stay_up', label: '熬夜' },
                    { value: 'miss_workout', label: '错过运动' },
                    { value: 'low_water', label: '饮水不足' },
                    { value: 'constipation', label: '便秘' },
                    { value: 'hangover', label: '宿醉' }
                ],
                
                isModalOpen: false,
                isEditing: false,
                submitting: false,
                formData: { id: null, scenario: 'overeat', title: '', description: '', points_cost: 10, order: 1 },

                // 翻译场景值为中文标签
                getScenarioLabel(val) {
                    const found = this.scenarios.find(s => s.value === val);
                    return found ? found.label : val;
                },

                // 初始化拉取数据
                async initData() {
                    await this.fetchData();
                },

                // 核心业务：拉取与解析列表数据 [Task 1]
                async fetchData() {
                    this.loading = true;
                    try {
                        // 步骤 1：调用 GET 接口，附带场景筛选参数
                        const payload = await window.API.getRemedies(this.searchScenario);
                        
                        // 步骤 2：兼容多层结构的数据解析
                        const list = payload?.data?.list || payload?.data || [];
                        this.items = list;
                    } catch (e) {
                        console.error('Fetch remedies error:', e);
                        alert('获取数据失败: ' + (e.message || '请检查网络'));
                    } finally {
                        this.loading = false;
                    }
                },

                // 打开弹窗并自动填充数据
                openModal(item = null) {
                    if (item) {
                        this.isEditing = true;
                        // 注意后端返回的描述可能是 desc 或 description，统一转为 description
                        this.formData = {
                            id: item.id,
                            scenario: item.scenario,
                            title: item.title,
                            description: item.description || item.desc || '', 
                            points_cost: item.points_cost || 0,
                            order: item.order || 1
                        };
                    } else {
                        this.isEditing = false;
                        const defaultScen = this.searchScenario || 'overeat';
                        this.formData = { id: null, scenario: defaultScen, title: '', description: '', points_cost: 10, order: 1 };
                    }
                    this.isModalOpen = true;
                },

                closeModal() {
                    this.isModalOpen = false;
                    this.submitting = false;
                },

                // 提交表单 (新增/编辑)
                async submitForm() {
                    if (!this.formData.title.trim()) return alert("请填写方案标题");
                    if (!this.formData.description.trim()) return alert("请填写方案详细描述");

                    this.submitting = true;
                    try {
                        if (this.isEditing) {
                            await window.API.updateRemedy(this.formData.id, this.formData);
                        } else {
                            await window.API.createRemedy(this.formData);
                        }
                        this.closeModal();
                        await this.fetchData(); // 重新加载数据
                    } catch (e) {
                        alert('操作失败: ' + (e.message || '未知错误'));
                        this.submitting = false;
                    }
                },

                // 安全删除提示
                async deleteItem(id) {
                    if (!confirm("此操作不可逆！确定要删除该补救方案吗？")) return;
                    try {
                        await window.API.deleteRemedy(id);
                        await this.fetchData(); // 重新加载数据
                    } catch (e) {
                        alert("删除失败: " + (e.message || '未知错误'));
                    }
                }
            };
        }
    </script>
</body>
</html>
