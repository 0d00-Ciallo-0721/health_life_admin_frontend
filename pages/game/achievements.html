<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成就字典管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/api.js"></script>
</head>
<body class="bg-gray-50 p-4 sm:p-8 text-gray-800 font-sans min-h-screen" x-data="achievementsApp()" x-init="initData()">

    <div x-show="toast.show" x-transition.opacity.duration.300ms
         class="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 flex items-center p-4 mb-4 text-sm text-green-800 border border-green-300 rounded-lg bg-green-50 shadow-md" 
         style="display: none;">
        <i data-lucide="check-circle" class="w-5 h-5 mr-2"></i>
        <span class="font-medium" x-text="toast.message"></span>
    </div>

    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 border-b border-gray-200 pb-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight flex items-center gap-2">
                <i data-lucide="award" class="w-6 h-6 text-amber-500"></i>
                游戏化成就字典
            </h1>
            <p class="text-sm text-gray-500 mt-1">管理系统内的游戏化徽章配置及用户解锁条件设定。</p>
        </div>

        <div class="flex flex-col sm:flex-row items-center gap-3 w-full sm:w-auto">
            <div class="relative w-full sm:w-64">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                <input type="text" 
                       x-model="searchQuery" 
                       @keydown.enter="fetchData()"
                       placeholder="搜索成就名称或描述..." 
                       class="w-full pl-9 pr-4 py-2 bg-white border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500 shadow-sm transition-all">
            </div>
            
            <button @click="openModal()" class="w-full sm:w-auto inline-flex justify-center items-center px-4 py-2 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-amber-600 hover:bg-amber-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-amber-500 transition-colors">
                <i data-lucide="plus" class="w-4 h-4 mr-1.5"></i>
                新增成就
            </button>
        </div>
    </div>

    <div class="bg-white shadow-sm rounded-lg overflow-hidden border border-gray-200">
        <div x-show="loading" class="p-12 text-center">
            <i data-lucide="loader-2" class="w-8 h-8 text-amber-500 animate-spin mx-auto mb-4"></i>
            <p class="text-gray-500 text-sm">正在加载成就数据...</p>
        </div>

        <table class="min-w-full divide-y divide-gray-200" x-show="!loading">
            <thead class="bg-gray-50">
                <tr>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-20">徽章</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">成就名称与描述</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">解锁条件 (Condition & Threshold)</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">奖励积分</th>
                    <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                <tr x-show="items.length === 0">
                    <td colspan="5" class="px-6 py-12 text-center text-gray-500">
                        <i data-lucide="medal" class="w-12 h-12 text-gray-300 mx-auto mb-3"></i>
                        没有找到匹配的成就徽章
                    </td>
                </tr>

                <template x-for="item in items" :key="item.id || item._id">
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="w-12 h-12 rounded-full bg-amber-50 border border-amber-200 flex items-center justify-center overflow-hidden">
                                <template x-if="item.icon_url">
                                    <img :src="item.icon_url" alt="icon" class="w-full h-full object-cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                                </template>
                                <i data-lucide="award" class="w-6 h-6 text-amber-400" :class="{'hidden': item.icon_url}"></i>
                            </div>
                        </td>

                        <td class="px-6 py-4">
                            <div class="text-sm font-bold text-gray-900" x-text="item.name"></div>
                            <div class="text-xs text-gray-500 mt-1 max-w-xs" x-text="item.description || item.desc || '暂无描述'"></div>
                        </td>

                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center gap-2">
                                <span class="px-2 py-0.5 rounded text-[11px] font-medium bg-blue-50 text-blue-700 border border-blue-100" 
                                      x-text="getConditionLabel(item.condition_type)"></span>
                                <span class="text-sm font-bold text-gray-700" x-text="`≥ ${item.threshold || 0}`"></span>
                            </div>
                            <div class="text-[10px] text-gray-400 mt-1 font-mono" x-text="`Type: ${item.condition_type}`"></div>
                        </td>

                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="inline-flex items-center text-sm font-bold text-amber-500" x-show="item.points_reward > 0">
                                +<span x-text="item.points_reward"></span>
                                <i data-lucide="coins" class="w-3.5 h-3.5 ml-1"></i>
                            </span>
                            <span class="text-sm text-gray-400" x-show="!item.points_reward || item.points_reward <= 0">无奖励</span>
                        </td>

                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <button @click="openModal(item)" class="text-indigo-600 hover:text-indigo-900 mr-4 transition-colors">编辑</button>
                            <button @click="deleteItem(item)" class="text-red-600 hover:text-red-900 transition-colors">删除</button>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <div x-show="isModalOpen" style="display: none;" class="fixed z-10 inset-0 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div x-show="isModalOpen" @click="closeModal()" x-transition.opacity class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen">&#8203;</span>
            
            <div x-show="isModalOpen" x-transition class="inline-block align-bottom bg-white rounded-xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <div class="flex items-center gap-3 mb-5 border-b pb-3">
                        <div class="bg-amber-100 p-2 rounded-full">
                            <i data-lucide="medal" class="w-5 h-5 text-amber-600"></i>
                        </div>
                        <h3 class="text-lg leading-6 font-medium text-gray-900" id="modal-title" x-text="isEditing ? '编辑成就徽章' : '新增成就徽章'"></h3>
                    </div>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">成就名称 <span class="text-red-500">*</span></label>
                            <input type="text" x-model="formData.name" placeholder="如：坚持饮水30天" class="block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-amber-500 focus:border-amber-500 sm:text-sm">
                        </div>

                        <div class="flex gap-4">
                            <div class="flex-1">
                                <label class="block text-sm font-medium text-gray-700 mb-1">条件判定 (condition_type) <span class="text-red-500">*</span></label>
                                <select x-model="formData.condition_type" class="block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-amber-500 focus:border-amber-500 sm:text-sm rounded-md border shadow-sm">
                                    <template x-for="cond in conditionTypes" :key="cond.value">
                                        <option :value="cond.value" x-text="cond.label"></option>
                                    </template>
                                </select>
                            </div>
                            <div class="w-32">
                                <label class="block text-sm font-medium text-gray-700 mb-1">阈值 (threshold) <span class="text-red-500">*</span></label>
                                <input type="number" x-model.number="formData.threshold" placeholder="如: 30" class="block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-amber-500 focus:border-amber-500 sm:text-sm">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">徽章图标链接 (icon_url)</label>
                            <input type="text" x-model="formData.icon_url" placeholder="https://..." class="block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-amber-500 focus:border-amber-500 sm:text-sm font-mono text-xs">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">奖励积分 (可选)</label>
                            <input type="number" x-model.number="formData.points_reward" placeholder="如: 100" class="block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-amber-500 focus:border-amber-500 sm:text-sm">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">成就详细描述 <span class="text-red-500">*</span></label>
                            <textarea x-model="formData.description" rows="2" placeholder="获得该成就的详细说明..." class="block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-amber-500 focus:border-amber-500 sm:text-sm"></textarea>
                        </div>
                    </div>
                </div>
                
                <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse border-t border-gray-200">
                    <button type="button" @click="submitForm()" :disabled="submitting" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-amber-600 text-base font-medium text-white hover:bg-amber-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-amber-500 sm:ml-3 sm:w-auto sm:text-sm disabled:opacity-50 transition-colors">
                        <span x-show="!submitting">保存提交</span>
                        <span x-show="submitting" class="flex items-center"><i data-lucide="loader-2" class="w-4 h-4 animate-spin mr-2"></i>处理中...</span>
                    </button>
                    <button type="button" @click="closeModal()" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-amber-500 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm transition-colors">
                        取消
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function achievementsApp() {
            return {
                items: [],
                loading: false,
                searchQuery: '',
                toast: { show: false, message: '' },
                
                // 预定义成就解锁条件字典
                conditionTypes: [
                    { value: 'continuous_login', label: '连续登录天数' },
                    { value: 'water_days', label: '累计饮水达标天数' },
                    { value: 'diet_logs', label: '累计饮食记录次数' },
                    { value: 'workout_duration', label: '累计运动时长(分钟)' },
                    { value: 'healthy_score', label: '单日健康分达标' }
                ],
                
                isModalOpen: false,
                isEditing: false,
                submitting: false,
                
                // 表单数据模型 (严格按照任务卡要求的字段)
                formData: { 
                    id: null, 
                    name: '', 
                    description: '', 
                    condition_type: 'water_days', 
                    threshold: null, 
                    icon_url: '', 
                    points_reward: 0 
                },

                async initData() {
                    await this.fetchData();
                },

                // 辅助方法：翻译条件类型
                getConditionLabel(val) {
                    const found = this.conditionTypes.find(c => c.value === val);
                    return found ? found.label : val;
                },

                // 步骤 1：加载成就字典数据
                async fetchData() {
                    this.loading = true;
                    try {
                        const payload = await window.API.getAchievements(this.searchQuery);
                        const list = payload?.data?.list || payload?.data || payload?.results || [];
                        this.items = list;
                    } catch (e) {
                        console.error('获取成就失败:', e);
                        alert('获取成就数据失败: ' + (e.message || '未知错误'));
                    } finally {
                        this.loading = false;
                        this.$nextTick(() => lucide.createIcons());
                    }
                },

                // 打开模态框，处理数据回显
                openModal(item = null) {
                    if (item) {
                        this.isEditing = true;
                        // 兼容底层 ID 和描述字段的可能差异
                        this.formData = {
                            id: item.id || item._id,
                            name: item.name || item.title || '',
                            description: item.description || item.desc || '',
                            condition_type: item.condition_type || 'water_days',
                            threshold: item.threshold || 0,
                            icon_url: item.icon_url || item.icon || '',
                            points_reward: item.points_reward || item.points || 0
                        };
                    } else {
                        this.isEditing = false;
                        this.formData = { 
                            id: null, name: '', description: '', 
                            condition_type: 'water_days', threshold: null, 
                            icon_url: '', points_reward: 0 
                        };
                    }
                    this.isModalOpen = true;
                    this.$nextTick(() => lucide.createIcons());
                },

                closeModal() {
                    this.isModalOpen = false;
                    this.submitting = false;
                },

                // 步骤 2 & 3：拦截表单提交，完成 POST / PUT 闭环
                async submitForm() {
                    // 前端字段校验
                    if (!this.formData.name.trim()) return alert("请填写成就名称");
                    if (!this.formData.description.trim()) return alert("请填写成就描述");
                    if (this.formData.threshold === null || this.formData.threshold === '') return alert("请设置解锁阈值 (threshold)");

                    this.submitting = true;
                    try {
                        // 构造纯净的 payload，确保类型正确
                        const payloadData = {
                            name: this.formData.name.trim(),
                            description: this.formData.description.trim(),
                            condition_type: this.formData.condition_type,
                            threshold: Number(this.formData.threshold),
                            icon_url: this.formData.icon_url.trim(),
                            points_reward: Number(this.formData.points_reward) || 0
                        };

                        if (this.isEditing) {
                            await window.API.updateAchievement(this.formData.id, payloadData);
                        } else {
                            await window.API.createAchievement(payloadData);
                        }
                        
                        // 成功后关闭弹窗并无刷新更新 DOM (重新 fetch)
                        this.closeModal();
                        await this.fetchData(); 
                        this.showToast(this.isEditing ? '成就已更新' : '成就创建成功');
                    } catch (e) {
                        console.error('保存失败:', e);
                        alert(e.message || '保存失败，请检查填写内容');
                        this.submitting = false;
                    }
                },

                // 删除成就逻辑
                async deleteItem(item) {
                    if (!confirm(`确定要彻底删除成就 [${item.name || item.title}] 吗？此操作不可逆。`)) return;
                    try {
                        const targetId = item.id || item._id;
                        await window.API.deleteAchievement(targetId);
                        this.showToast('成就已删除');
                        await this.fetchData(); // 删除成功后更新 DOM
                    } catch (e) {
                        alert('删除失败: ' + (e.message || '未知错误'));
                    }
                },

                // 显示 Toast
                showToast(msg) {
                    this.toast.message = msg;
                    this.toast.show = true;
                    setTimeout(() => { this.toast.show = false; }, 3000);
                }
            }
        }
    </script>
</body>
</html>
