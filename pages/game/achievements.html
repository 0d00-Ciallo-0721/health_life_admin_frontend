<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成就字典管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../assets/js/api.js"></script>
</head>
<body class="bg-transparent p-2 sm:p-6 text-gray-800 font-sans" x-data="achievementsApp()" x-init="initData()">

    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight">成就字典</h1>
            <p class="text-sm text-gray-500 mt-1">管理系统内的游戏化徽章配置及用户解锁热度统计。</p>
        </div>

        <div class="flex items-center gap-3 w-full sm:w-auto">
            <div class="relative w-full sm:w-64">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                <input type="text" x-model="searchQuery" @keyup.debounce.500ms="fetchData()"
                    class="w-full pl-10 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-amber-500 outline-none transition-all shadow-sm text-sm"
                    placeholder="搜索成就名称或代码...">
            </div>
            <button @click="openModal()" class="bg-amber-500 hover:bg-amber-600 text-white px-5 py-2.5 rounded-xl font-medium shadow-[0_4px_14px_0_rgba(245,158,11,0.39)] hover:shadow-[0_6px_20px_rgba(245,158,11,0.23)] hover:-translate-y-0.5 transition-all flex items-center">
                <i data-lucide="plus" class="w-4 h-4 mr-2"></i> 新增徽章
            </button>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-[0_2px_10px_rgb(0,0,0,0.02)] border border-gray-100/80 overflow-hidden relative">
        <div x-show="loading" class="absolute inset-0 bg-white/60 backdrop-blur-sm z-10 flex items-center justify-center">
            <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-amber-500"></i>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-50/80 text-gray-400 text-xs uppercase tracking-wider border-b border-gray-100">
                        <th class="px-6 py-4 font-semibold">徽章视觉与名称</th>
                        <th class="px-6 py-4 font-semibold">唯一代码 (Code)</th>
                        <th class="px-6 py-4 font-semibold">属性收益</th>
                        <th class="px-6 py-4 font-semibold">全站解锁进度</th>
                        <th class="px-6 py-4 font-semibold text-right">操作</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-50">
                    <template x-for="item in list" :key="item.id">
                        <tr class="hover:bg-amber-50/20 transition-colors group">
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-4">
                                    <div class="relative flex-shrink-0">
                                        <div class="absolute inset-0 bg-amber-400 blur-md opacity-20 group-hover:opacity-40 transition-opacity rounded-full"></div>
                                        <div class="w-12 h-12 relative rounded-2xl bg-gradient-to-br from-amber-50 to-orange-50 flex items-center justify-center border border-amber-200/50 shadow-sm z-10 overflow-hidden">
                                            <template x-if="item.icon"><img :src="item.icon" class="w-full h-full object-cover"></template>
                                            <template x-if="!item.icon"><i data-lucide="award" class="w-6 h-6 text-amber-500"></i></template>
                                        </div>
                                    </div>
                                    <div>
                                        <div class="text-sm font-extrabold text-gray-900" x-text="item.title"></div>
                                        <div class="text-xs text-gray-500 mt-1 line-clamp-1 max-w-[200px]" x-text="item.desc"></div>
                                    </div>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <span class="px-2.5 py-1 bg-gray-50 border border-gray-200 text-gray-500 font-mono text-xs rounded-md" x-text="item.code"></span>
                            </td>
                            <td class="px-6 py-4">
                                <div class="flex flex-col gap-1.5">
                                    <span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider bg-purple-50 text-purple-600 border border-purple-100 w-fit" x-text="item.category || '通用'"></span>
                                    <span class="text-xs text-amber-600 font-bold flex items-center">
                                        <i data-lucide="coins" class="w-3 h-3 mr-1"></i>
                                        +<span x-text="item.points || 0"></span> PTS
                                    </span>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <div class="flex flex-col gap-1.5">
                                    <div class="flex items-center justify-between text-xs">
                                        <span class="font-medium text-gray-700"><span x-text="item.unlocked_count || 0"></span> 人已获</span>
                                    </div>
                                    <div class="w-32 h-1.5 bg-gray-100 rounded-full overflow-hidden">
                                        <div class="h-full bg-gradient-to-r from-amber-400 to-orange-500 rounded-full" 
                                             :style="`width: ${Math.min(((item.unlocked_count || 0) / 1000) * 100, 100)}%`"></div>
                                    </div>
                                </div>
                            </td>
                            <td class="px-6 py-4 text-right">
                                <div class="flex justify-end space-x-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button @click="openModal(item)" class="p-2 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                                    <button @click="deleteItem(item.id)" class="p-2 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                </div>
                            </td>
                        </tr>
                    </template>
                    <tr x-show="!loading && list.length === 0">
                        <td colspan="5" class="px-6 py-12 text-center text-gray-500 text-sm">暂无成就数据</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div x-show="isModalOpen" style="display: none;" class="fixed inset-0 z-50 flex items-center justify-center pointer-events-auto">
        <div x-show="isModalOpen" x-transition.opacity.duration.300ms class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm" @click="closeModal()"></div>
        <div x-show="isModalOpen" x-transition class="relative bg-white rounded-3xl shadow-2xl w-full max-w-lg mx-4 overflow-hidden flex flex-col">
            <div class="px-6 py-5 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <h3 class="text-lg font-bold text-gray-900" x-text="isEditing ? '编辑成就' : '新增成就'"></h3>
                <button @click="closeModal()" class="text-gray-400 hover:text-gray-600 hover:bg-gray-200/50 p-2 rounded-xl transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <form @submit.prevent="submitForm" class="p-6 space-y-5 flex-1 overflow-y-auto max-h-[70vh]">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">成就名称 <span class="text-red-500">*</span></label>
                    <input type="text" x-model="form.title" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-amber-500 outline-none transition-all text-sm">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">唯一代码 <span class="text-red-500">*</span></label>
                        <input type="text" x-model="form.code" :disabled="isEditing" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-amber-500 outline-none transition-all text-sm disabled:bg-gray-100">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">奖励积分</label>
                        <input type="number" x-model.number="form.points" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-amber-500 outline-none transition-all text-sm">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">所属类别</label>
                        <input type="text" x-model="form.category" placeholder="如: 社交互动, 减脂" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-amber-500 outline-none transition-all text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">图标 URL</label>
                        <input type="text" x-model="form.icon" placeholder="http://..." class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-amber-500 outline-none transition-all text-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">成就描述</label>
                    <textarea x-model="form.desc" rows="3" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-amber-500 outline-none transition-all text-sm resize-none"></textarea>
                </div>
            </form>
            <div class="px-6 py-4 border-t border-gray-100 flex justify-end gap-3 bg-white">
                <button type="button" @click="closeModal()" class="px-5 py-2.5 bg-white border border-gray-200 text-gray-700 rounded-xl hover:bg-gray-50 transition-colors text-sm font-medium">取消</button>
                <button type="button" @click="submitForm()" class="px-5 py-2.5 bg-amber-500 hover:bg-amber-600 text-white rounded-xl transition-all shadow-md shadow-amber-500/20 text-sm font-medium flex items-center">
                    <span x-text="isEditing ? '保存修改' : '确认创建'"></span>
                </button>
            </div>
        </div>
    </div>

    <script>
        function achievementsApp() {
            return {
                list: [], loading: false, searchQuery: '',
                isModalOpen: false, isEditing: false, currentId: null,
                form: { title: '', code: '', desc: '', icon: '', points: 0, category: '' },

                async initData() { await this.fetchData(); },

                async fetchData() {
                    this.loading = true;
                    try {
                        const res = await window.API.getAchievements(this.searchQuery);
                        this.list = res.data?.results || res.data || [];
                    } catch (e) { alert(e.message); } finally {
                        this.loading = false; this.$nextTick(() => lucide.createIcons());
                    }
                },

                openModal(item = null) {
                    if (item) {
                        this.isEditing = true; this.currentId = item.id;
                        this.form = { title: item.title, code: item.code, desc: item.desc, icon: item.icon || '', points: item.points || 0, category: item.category || '' };
                    } else {
                        this.isEditing = false; this.currentId = null;
                        this.form = { title: '', code: '', desc: '', icon: '', points: 0, category: '通用' };
                    }
                    this.isModalOpen = true;
                },

                closeModal() { this.isModalOpen = false; },

                async submitForm() {
                    if(!this.form.title || !this.form.code) return alert("名称和代码必填");
                    try {
                        if (this.isEditing) await window.API.updateAchievement(this.currentId, this.form);
                        else await window.API.createAchievement(this.form);
                        this.closeModal();
                        await this.fetchData();
                    } catch (e) { alert('保存失败: ' + e.message); }
                },

                async deleteItem(id) {
                    if (!confirm('确定要彻底删除该成就吗？')) return;
                    try {
                        await window.API.deleteAchievement(id);
                        await this.fetchData();
                    } catch (e) { alert('删除失败: ' + e.message); }
                }
            }
        }
    </script>
</body>
</html>
