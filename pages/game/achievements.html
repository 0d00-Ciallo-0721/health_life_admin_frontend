<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成就字典管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/api.js"></script>
</head>
<body class="bg-gray-50 p-4 sm:p-8 text-gray-800 font-sans min-h-screen" x-data="achievementsApp()" x-init="initData()">

    <div x-show="toast.show" x-transition.opacity.duration.300ms
         class="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 flex items-center p-4 mb-4 text-sm text-green-800 border border-green-300 rounded-lg bg-green-50 shadow-md" 
         style="display: none;">
        <i data-lucide="check-circle" class="w-5 h-5 mr-2"></i>
        <span class="font-medium" x-text="toast.message"></span>
    </div>

    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 border-b border-gray-200 pb-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight flex items-center gap-2">
                <i data-lucide="award" class="w-6 h-6 text-amber-500"></i>
                游戏化成就字典
            </h1>
            <p class="text-sm text-gray-500 mt-1">管理系统内的游戏化徽章配置库及成就奖励体系。</p>
        </div>

        <div class="flex flex-col sm:flex-row items-center gap-3 w-full sm:w-auto">
            <div class="relative w-full sm:w-64">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                <input type="text" 
                       x-model="searchQuery" 
                       @keydown.enter="fetchData()"
                       placeholder="搜索成就标题或描述..." 
                       class="w-full pl-9 pr-4 py-2 bg-white border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500 shadow-sm transition-all">
            </div>
            
            <button @click="openModal()" class="w-full sm:w-auto inline-flex justify-center items-center px-4 py-2 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-amber-600 hover:bg-amber-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-amber-500 transition-colors">
                <i data-lucide="plus" class="w-4 h-4 mr-1.5"></i>
                新增成就
            </button>
        </div>
    </div>

    <div class="bg-white shadow-sm rounded-lg overflow-hidden border border-gray-200">
        <div x-show="loading" class="p-12 text-center">
            <i data-lucide="loader-2" class="w-8 h-8 text-amber-500 animate-spin mx-auto mb-4"></i>
            <p class="text-gray-500 text-sm">正在加载成就数据...</p>
        </div>

        <table class="min-w-full divide-y divide-gray-200" x-show="!loading">
            <thead class="bg-gray-50">
                <tr>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-20">徽章</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">成就名称与描述</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">分类与稀有度</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">奖励积分</th>
                    <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                <tr x-show="items.length === 0">
                    <td colspan="5" class="px-6 py-12 text-center text-gray-500">
                        <i data-lucide="medal" class="w-12 h-12 text-gray-300 mx-auto mb-3"></i>
                        没有找到匹配的成就徽章
                    </td>
                </tr>

                <template x-for="item in items" :key="item.id || item._id">
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="w-12 h-12 rounded-full bg-amber-50 border border-amber-200 flex items-center justify-center overflow-hidden">
                                <template x-if="item.icon">
                                    <img :src="item.icon" alt="icon" class="w-full h-full object-cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                                </template>
                                <i data-lucide="award" class="w-6 h-6 text-amber-400" :class="{'hidden': item.icon}"></i>
                            </div>
                        </td>

                        <td class="px-6 py-4">
                            <div class="text-sm font-bold text-gray-900" x-text="item.title"></div>
                            <div class="text-xs text-gray-500 mt-1 max-w-xs" x-text="item.desc || '暂无描述'"></div>
                        </td>

                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="px-2 py-0.5 rounded text-[11px] font-medium bg-blue-50 text-blue-700 border border-blue-100" 
                                      x-text="getCategoryLabel(item.category)"></span>
                                <span class="px-2 py-0.5 rounded text-[11px] font-bold"
                                      :class="getRarityStyle(item.rarity)"
                                      x-text="getRarityLabel(item.rarity)"></span>
                            </div>
                            <div class="text-[10px] text-gray-400 font-mono" x-text="`Code: ${item.code}`"></div>
                        </td>

                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="inline-flex items-center text-sm font-bold text-amber-500" x-show="item.points > 0">
                                +<span x-text="item.points"></span>
                                <i data-lucide="coins" class="w-3.5 h-3.5 ml-1"></i>
                            </span>
                            <span class="text-sm text-gray-400" x-show="!item.points || item.points <= 0">无奖励</span>
                        </td>

                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <button @click="openModal(item)" class="text-indigo-600 hover:text-indigo-900 mr-4 transition-colors">编辑</button>
                            <button @click="deleteItem(item)" class="text-red-600 hover:text-red-900 transition-colors">删除</button>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <div x-show="isModalOpen" style="display: none;" class="fixed z-10 inset-0 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div x-show="isModalOpen" @click="closeModal()" x-transition.opacity class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen">&#8203;</span>
            
            <div x-show="isModalOpen" x-transition class="inline-block align-bottom bg-white rounded-xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <div class="flex items-center gap-3 mb-5 border-b pb-3">
                        <div class="bg-amber-100 p-2 rounded-full">
                            <i data-lucide="medal" class="w-5 h-5 text-amber-600"></i>
                        </div>
                        <h3 class="text-lg leading-6 font-medium text-gray-900" id="modal-title" x-text="isEditing ? '编辑成就徽章' : '新增成就徽章'"></h3>
                    </div>
                    
                    <div class="space-y-4">
                        <div class="flex gap-4">
                            <div class="flex-1">
                                <label class="block text-sm font-medium text-gray-700 mb-1">成就标题 (title) <span class="text-red-500">*</span></label>
                                <input type="text" x-model="formData.title" placeholder="如：水之源泉" class="block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-amber-500 focus:border-amber-500 sm:text-sm">
                            </div>
                            <div class="flex-1">
                                <label class="block text-sm font-medium text-gray-700 mb-1">成就编码 (code) <span class="text-red-500">*</span></label>
                                <input type="text" x-model="formData.code" placeholder="如: ACH_WATER_01" class="block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-amber-500 focus:border-amber-500 sm:text-sm font-mono text-sm">
                            </div>
                        </div>

                        <div class="flex gap-4">
                            <div class="flex-1">
                                <label class="block text-sm font-medium text-gray-700 mb-1">所属分类 (category)</label>
                                <select x-model="formData.category" class="block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-amber-500 focus:border-amber-500 sm:text-sm rounded-md border shadow-sm">
                                    <template x-for="cat in categories" :key="cat.value">
                                        <option :value="cat.value" x-text="cat.label"></option>
                                    </template>
                                </select>
                            </div>
                            <div class="flex-1">
                                <label class="block text-sm font-medium text-gray-700 mb-1">稀有度 (rarity)</label>
                                <select x-model="formData.rarity" class="block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-amber-500 focus:border-amber-500 sm:text-sm rounded-md border shadow-sm">
                                    <template x-for="r in rarities" :key="r.value">
                                        <option :value="r.value" x-text="r.label"></option>
                                    </template>
                                </select>
                            </div>
                        </div>

                        <div class="flex gap-4">
                            <div class="flex-1">
                                <label class="block text-sm font-medium text-gray-700 mb-1">徽章图标链接 (icon)</label>
                                <input type="text" x-model="formData.icon" placeholder="https://..." class="block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-amber-500 focus:border-amber-500 sm:text-sm font-mono text-xs">
                            </div>
                            <div class="w-32">
                                <label class="block text-sm font-medium text-gray-700 mb-1">奖励积分 (points)</label>
                                <input type="number" x-model.number="formData.points" placeholder="如: 100" class="block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-amber-500 focus:border-amber-500 sm:text-sm">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">成就详细描述 (desc) <span class="text-red-500">*</span></label>
                            <textarea x-model="formData.desc" rows="2" placeholder="展示给用户的详细说明..." class="block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-amber-500 focus:border-amber-500 sm:text-sm"></textarea>
                        </div>
                    </div>
                </div>
                
                <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse border-t border-gray-200">
                    <button type="button" @click="submitForm()" :disabled="submitting" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-amber-600 text-base font-medium text-white hover:bg-amber-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-amber-500 sm:ml-3 sm:w-auto sm:text-sm disabled:opacity-50 transition-colors">
                        <span x-show="!submitting">保存提交</span>
                        <span x-show="submitting" class="flex items-center"><i data-lucide="loader-2" class="w-4 h-4 animate-spin mr-2"></i>处理中...</span>
                    </button>
                    <button type="button" @click="closeModal()" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-amber-500 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm transition-colors">
                        取消
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function achievementsApp() {
            return {
                items: [],
                loading: false,
                searchQuery: '',
                toast: { show: false, message: '' },
                
                // 预定义成就分类字典
                categories: [
                    { value: 'daily', label: '每日成就' },
                    { value: 'weekly', label: '每周成就' },
                    { value: 'monthly', label: '每月成就' },
                    { value: 'special', label: '特殊专属' }
                ],

                // 预定义稀有度字典
                rarities: [
                    { value: 'common', label: '普通 (Common)' },
                    { value: 'rare', label: '稀有 (Rare)' },
                    { value: 'epic', label: '史诗 (Epic)' }
                ],
                
                isModalOpen: false,
                isEditing: false,
                submitting: false,
                
                // 表单数据模型完全对齐文档
                formData: { 
                    id: null, 
                    code: '', 
                    title: '', 
                    desc: '',
                    category: 'special', 
                    rarity: 'common', 
                    icon: '', 
                    points: 0 
                },

                async initData() {
                    await this.fetchData();
                },

                getCategoryLabel(val) {
                    const found = this.categories.find(c => c.value === val);
                    return found ? found.label : (val || '特殊');
                },

                getRarityLabel(val) {
                    const found = this.rarities.find(r => r.value === val);
                    return found ? found.label.split(' ')[0] : '普通';
                },

                getRarityStyle(val) {
                    const styles = {
                        'common': 'bg-gray-100 text-gray-700 border border-gray-200',
                        'rare': 'bg-blue-100 text-blue-700 border border-blue-200',
                        'epic': 'bg-purple-100 text-purple-700 border border-purple-200'
                    };
                    return styles[val] || styles['common'];
                },

                // 加载成就数据
                async fetchData() {
                    this.loading = true;
                    try {
                        const payload = await window.API.getAchievements(this.searchQuery);
                        const list = payload?.data?.list || payload?.data || payload?.results || [];
                        this.items = list;
                    } catch (e) {
                        console.error('获取成就失败:', e);
                        alert('获取成就数据失败: ' + (e.message || '未知错误'));
                    } finally {
                        this.loading = false;
                        this.$nextTick(() => lucide.createIcons());
                    }
                },

                // 打开模态框，处理数据回显
                openModal(item = null) {
                    if (item) {
                        this.isEditing = true;
                        this.formData = {
                            id: item.id || item._id,
                            code: item.code || '',
                            title: item.title || item.name || '',
                            desc: item.desc || item.description || '',
                            category: item.category || 'special',
                            rarity: item.rarity || 'common',
                            icon: item.icon || item.icon_url || '',
                            points: item.points || item.points_reward || 0
                        };
                    } else {
                        this.isEditing = false;
                        this.formData = { 
                            id: null, code: '', title: '', desc: '', 
                            category: 'special', rarity: 'common', 
                            icon: '', points: 0 
                        };
                    }
                    this.isModalOpen = true;
                    this.$nextTick(() => lucide.createIcons());
                },

                closeModal() {
                    this.isModalOpen = false;
                    this.submitting = false;
                },

                // 提交表单 (对齐契约)
                async submitForm() {
                    // 前端字段校验
                    if (!this.formData.title.trim()) return alert("请填写成就标题");
                    if (!this.formData.code.trim()) return alert("请填写成就编码");
                    if (!this.formData.desc.trim()) return alert("请填写成就描述");

                    this.submitting = true;
                    try {
                        // 构造符合文档的新版 Payload
                        const payloadData = {
                            code: this.formData.code.trim(),
                            title: this.formData.title.trim(),
                            desc: this.formData.desc.trim(),
                            category: this.formData.category,
                            rarity: this.formData.rarity,
                            icon: this.formData.icon.trim(),
                            points: Number(this.formData.points) || 0
                        };

                        if (this.isEditing) {
                            await window.API.updateAchievement(this.formData.id, payloadData);
                        } else {
                            await window.API.createAchievement(payloadData);
                        }
                        
                        // 成功后关闭弹窗并无刷新更新 DOM
                        this.closeModal();
                        await this.fetchData(); 
                        this.showToast(this.isEditing ? '成就已更新' : '成就创建成功');
                    } catch (e) {
                        console.error('保存失败:', e);
                        alert(e.message || '保存失败，请检查填写内容');
                        this.submitting = false;
                    }
                },

                // 删除成就逻辑
                async deleteItem(item) {
                    if (!confirm(`确定要彻底删除成就 [${item.title || item.name}] 吗？此操作不可逆。`)) return;
                    try {
                        const targetId = item.id || item._id;
                        await window.API.deleteAchievement(targetId);
                        this.showToast('成就已删除');
                        await this.fetchData(); // 删除成功后更新 DOM
                    } catch (e) {
                        alert('删除失败: ' + (e.message || '未知错误'));
                    }
                },

                // 显示 Toast
                showToast(msg) {
                    this.toast.message = msg;
                    this.toast.show = true;
                    setTimeout(() => { this.toast.show = false; }, 3000);
                }
            }
        }
    </script>
</body>
</html>
