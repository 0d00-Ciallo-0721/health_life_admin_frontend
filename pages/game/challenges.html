<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>挑战任务管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../assets/js/api.js"></script>
</head>
<body class="bg-transparent p-2 sm:p-6 text-gray-800 font-sans" x-data="tasksApp()" x-init="initTasks()">

    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-6 gap-4 border-b border-gray-200 pb-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight">健康挑战任务</h1>
            <p class="text-sm text-gray-500 mt-1">配置游戏化模块的每日/每周任务规则及积分奖励。</p>
        </div>
        <button @click="openModal()" class="flex items-center px-4 py-2 bg-teal-600 hover:bg-teal-700 text-white rounded-xl text-sm font-medium transition-all shadow-lg shadow-teal-500/30 focus:ring-4 focus:ring-teal-500/20">
            <i data-lucide="plus" class="w-4 h-4 mr-1.5"></i>
            新增任务
        </button>
    </div>

    <div class="flex flex-col sm:flex-row gap-4 mb-6">
        <div class="relative w-full sm:w-72">
            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
            <input type="text" x-model="searchQuery" @keyup.debounce.500ms="fetchTasks()"
                class="w-full pl-10 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500 outline-none transition-all shadow-sm text-sm"
                placeholder="搜索任务标题...">
        </div>
        <select x-model="filterType" @change="fetchTasks()"
            class="w-full sm:w-48 px-4 py-2.5 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500 outline-none transition-all shadow-sm text-sm appearance-none cursor-pointer">
            <option value="">全部类型</option>
            <option value="daily">每日任务 (Daily)</option>
            <option value="weekly">每周挑战 (Weekly)</option>
        </select>
    </div>

    <div class="bg-white rounded-2xl shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-gray-100/80 overflow-hidden relative">
        <div x-show="loading" class="absolute inset-0 bg-white/60 backdrop-blur-sm z-10 flex items-center justify-center">
            <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-teal-600"></i>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-50/50 text-gray-400 text-xs uppercase tracking-wider border-b border-gray-100">
                        <th class="px-6 py-4 font-semibold">任务标识</th>
                        <th class="px-6 py-4 font-semibold">任务类型</th>
                        <th class="px-6 py-4 font-semibold">奖励积分</th>
                        <th class="px-6 py-4 font-semibold">状态</th>
                        <th class="px-6 py-4 font-semibold text-right">操作</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-50">
                    <template x-for="task in tasks" :key="task.id">
                        <tr class="hover:bg-teal-50/20 transition-colors group">
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-teal-50 to-emerald-50 flex items-center justify-center border border-teal-100">
                                        <i data-lucide="target" class="w-5 h-5 text-teal-600"></i>
                                    </div>
                                    <div>
                                        <div class="text-sm font-bold text-gray-900" x-text="task.title"></div>
                                        <div class="text-xs text-gray-500 mt-1 line-clamp-1 max-w-xs" x-text="task.description || '无描述'"></div>
                                    </div>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <span class="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-medium border"
                                      :class="task.task_type === 'daily' ? 'bg-blue-50 text-blue-600 border-blue-200' : 'bg-purple-50 text-purple-600 border-purple-200'">
                                      <i :data-lucide="task.task_type === 'daily' ? 'calendar-days' : 'calendar-range'" class="w-3 h-3 mr-1.5"></i>
                                      <span x-text="task.task_type === 'daily' ? '日常任务' : '周挑战'"></span>
                                </span>
                            </td>
                            <td class="px-6 py-4">
                                <div class="flex items-center font-bold text-amber-500">
                                    <i data-lucide="coins" class="w-4 h-4 mr-1"></i> +<span x-text="task.reward_points || 0"></span>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" class="sr-only peer" :checked="task.is_active" @change="toggleStatus(task)">
                                    <div class="w-9 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-teal-500"></div>
                                    <span class="ml-2 text-xs font-medium" :class="task.is_active ? 'text-teal-600' : 'text-gray-400'" x-text="task.is_active ? '进行中' : '已下线'"></span>
                                </label>
                            </td>
                            <td class="px-6 py-4 text-right">
                                <div class="flex justify-end space-x-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button @click="openModal(task)" class="p-2 text-gray-400 hover:text-teal-600 hover:bg-teal-50 rounded-lg transition-colors focus:outline-none" title="编辑">
                                        <i data-lucide="edit-3" class="w-4 h-4"></i>
                                    </button>
                                    <button @click="deleteTask(task)" class="p-2 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors focus:outline-none" title="删除">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </template>
                    <tr x-show="!loading && tasks.length === 0">
                        <td colspan="5" class="px-6 py-12 text-center text-gray-500 text-sm">暂无符合条件的任务数据</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div x-show="isModalOpen" style="display: none;" class="fixed inset-0 z-50 flex items-center justify-center pointer-events-auto">
        <div x-show="isModalOpen" x-transition.opacity.duration.300ms class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm" @click="closeModal()"></div>
        
        <div x-show="isModalOpen" x-transition class="relative bg-white rounded-3xl shadow-2xl w-full max-w-lg mx-4 overflow-hidden flex flex-col">
            <div class="px-6 py-5 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <h3 class="text-lg font-bold text-gray-900" x-text="isEditing ? '编辑任务配置' : '新增挑战任务'"></h3>
                <button @click="closeModal()" class="text-gray-400 hover:text-gray-600 hover:bg-gray-200/50 p-2 rounded-xl transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <form @submit.prevent="submitForm" class="p-6 space-y-5 flex-1 overflow-y-auto max-h-[70vh]">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">任务标题 <span class="text-red-500">*</span></label>
                    <input type="text" x-model="formData.title" required
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-teal-500 outline-none transition-all text-sm">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">任务类型 <span class="text-red-500">*</span></label>
                        <select x-model="formData.task_type" required
                            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-teal-500 outline-none transition-all text-sm appearance-none">
                            <option value="daily">每日任务 (Daily)</option>
                            <option value="weekly">每周挑战 (Weekly)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">奖励积分 (Points) <span class="text-red-500">*</span></label>
                        <input type="number" x-model.number="formData.reward_points" required min="0"
                            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-amber-500 outline-none transition-all text-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">任务状态</label>
                    <label class="relative inline-flex items-center cursor-pointer mt-1">
                        <input type="checkbox" class="sr-only peer" x-model="formData.is_active">
                        <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-teal-500"></div>
                        <span class="ml-3 text-sm font-medium text-gray-700" x-text="formData.is_active ? '上线 (对外可见)' : '下线 (隐藏)'"></span>
                    </label>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">任务描述</label>
                    <textarea x-model="formData.description" rows="3"
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-teal-500 outline-none transition-all text-sm resize-none"></textarea>
                </div>
            </form>

            <div class="px-6 py-4 border-t border-gray-100 flex justify-end gap-3 bg-white">
                <button type="button" @click="closeModal()" class="px-5 py-2.5 bg-white border border-gray-200 text-gray-700 rounded-xl hover:bg-gray-50 transition-colors text-sm font-medium">取消</button>
                <button type="button" @click="submitForm()" :disabled="submitting"
                    class="px-5 py-2.5 bg-teal-600 hover:bg-teal-700 text-white rounded-xl transition-all shadow-md shadow-teal-500/20 text-sm font-medium flex items-center disabled:opacity-70">
                    <i data-lucide="loader-2" x-show="submitting" class="w-4 h-4 mr-2 animate-spin"></i>
                    <span x-text="isEditing ? '保存修改' : '确认创建'"></span>
                </button>
            </div>
        </div>
    </div>

    <script>
        function tasksApp() {
            return {
                tasks: [],
                loading: true,
                searchQuery: '',
                filterType: '',
                isModalOpen: false, isEditing: false, submitting: false,
                formData: { id: null, title: '', task_type: 'daily', reward_points: 10, description: '', is_active: true },

                async initTasks() { await this.fetchTasks(); },

                async fetchTasks() {
                    this.loading = true;
                    try {
                        const response = await window.API.getTasks(this.searchQuery, this.filterType);
                        this.tasks = response.results || response.data || response || [];
                    } catch (error) { alert(error.message || '获取任务失败'); } 
                    finally { this.loading = false; this.$nextTick(() => lucide.createIcons()); }
                },

                openModal(task = null) {
                    if (task) {
                        this.isEditing = true;
                        this.formData = JSON.parse(JSON.stringify(task)); 
                    } else {
                        this.isEditing = false;
                        this.formData = { id: null, title: '', task_type: 'daily', reward_points: 10, description: '', is_active: true };
                    }
                    this.isModalOpen = true;
                },

                closeModal() { this.isModalOpen = false; this.submitting = false; },

                async submitForm() {
                    if (!this.formData.title) return alert("请填写任务标题");
                    this.submitting = true;
                    try {
                        if (this.isEditing) await window.API.updateTask(this.formData.id, this.formData);
                        else await window.API.createTask(this.formData);
                        this.closeModal();
                        await this.fetchTasks();
                    } catch (error) { alert(error.message || '保存失败'); this.submitting = false; }
                },

                async deleteTask(task) {
                    if (!confirm(`确定要彻底删除任务 "${task.title}" 吗？此操作不可恢复。`)) return;
                    try {
                        await window.API.deleteTask(task.id);
                        await this.fetchTasks();
                    } catch (error) { alert(error.message || '删除失败'); }
                },

                async toggleStatus(task) {
                    // API 调用：仅修改启用状态
                    const originStatus = task.is_active;
                    try {
                        task.is_active = !task.is_active;
                        await window.API.updateTask(task.id, { is_active: task.is_active });
                    } catch(e) {
                        task.is_active = originStatus; // 失败回滚
                        alert("状态切换失败");
                    }
                }
            }
        }
    </script>
</body>
</html>
