<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息通知管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/api.js"></script>
</head>
<body class="bg-transparent p-2 sm:p-6 text-gray-800 font-sans min-h-screen" x-data="notifyApp()" x-init="initNotify()">

    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-8 border-b border-gray-200 pb-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight flex items-center">
                <i data-lucide="radio" class="w-6 h-6 mr-2 text-teal-600"></i>
                系统广播台
            </h1>
            <p class="text-sm text-gray-500 mt-1">发布全员系统公告，或查看已发送的私信通知记录。</p>
        </div>
        <button @click="isModalOpen = true" class="mt-4 sm:mt-0 flex items-center px-5 py-2.5 bg-gray-900 hover:bg-gray-800 text-white rounded-xl text-sm font-medium transition-all shadow-lg shadow-gray-900/20 focus:ring-4 focus:ring-gray-900/10">
            <i data-lucide="send" class="w-4 h-4 mr-2"></i>发布新公告
        </button>
    </div>

    <div class="max-w-4xl mx-auto relative">
        
        <div x-show="loading" class="space-y-6">
            <template x-for="i in 4">
                <div class="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm animate-pulse flex gap-4">
                    <div class="w-12 h-12 bg-gray-200 rounded-full flex-shrink-0"></div>
                    <div class="flex-1 space-y-3 py-1">
                        <div class="h-4 bg-gray-200 rounded w-1/4"></div>
                        <div class="h-3 bg-gray-100 rounded w-3/4"></div>
                        <div class="h-3 bg-gray-100 rounded w-1/2"></div>
                    </div>
                </div>
            </template>
        </div>

        <div x-show="!loading && notifications.length > 0" class="absolute left-8 top-8 bottom-8 w-px bg-gray-200 hidden sm:block z-0"></div>

        <div class="space-y-6 relative z-10">
            <template x-for="item in notifications" :key="item.id">
                <div class="group bg-white rounded-2xl p-5 sm:p-6 shadow-[0_2px_10px_rgb(0,0,0,0.02)] border border-gray-100/80 hover:shadow-[0_8px_30px_rgb(0,0,0,0.06)] hover:border-teal-100 transition-all duration-300 flex flex-col sm:flex-row gap-4 sm:gap-6 ml-0 sm:ml-12 relative">
                    
                    <div class="hidden sm:flex absolute -left-12 top-6 w-8 h-8 rounded-full border-4 border-[#f4f7f6] items-center justify-center z-10"
                         :class="item.type === 'public' ? 'bg-teal-500 text-white' : 'bg-blue-400 text-white'">
                        <i :data-lucide="item.type === 'public' ? 'megaphone' : 'mail'" class="w-3.5 h-3.5"></i>
                    </div>

                    <div class="sm:hidden flex-shrink-0 w-10 h-10 rounded-full flex items-center justify-center"
                         :class="item.type === 'public' ? 'bg-teal-50 text-teal-600' : 'bg-blue-50 text-blue-500'">
                         <i :data-lucide="item.type === 'public' ? 'megaphone' : 'mail'" class="w-5 h-5"></i>
                    </div>

                    <div class="flex-1">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-base font-bold text-gray-900" x-text="item.title"></h3>
                            <button @click="deleteNotify(item.id)" class="text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity p-1 rounded-md hover:bg-red-50 focus:outline-none">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                        
                        <p class="text-sm text-gray-600 mb-4 leading-relaxed whitespace-pre-line" x-text="item.content"></p>
                        
                        <div class="flex items-center text-xs font-medium text-gray-400 space-x-4">
                            <span class="flex items-center">
                                <i data-lucide="clock" class="w-3.5 h-3.5 mr-1 text-gray-300"></i>
                                <span x-text="window.Utils ? window.Utils.formatDate(item.created_at) : item.created_at"></span>
                            </span>
                            <span class="flex items-center" :class="item.type === 'public' ? 'text-teal-600' : 'text-blue-500'">
                                <i data-lucide="users" class="w-3.5 h-3.5 mr-1"></i>
                                <span x-text="item.type === 'public' ? '全员公告' : '系统私信'"></span>
                            </span>
                        </div>
                    </div>
                </div>
            </template>
            
            <div x-show="!loading && notifications.length === 0" class="text-center py-20 text-gray-500">
                <div class="inline-flex w-16 h-16 bg-gray-100 rounded-full items-center justify-center mb-4">
                    <i data-lucide="inbox" class="w-8 h-8 text-gray-400"></i>
                </div>
                <p>暂无历史广播记录</p>
            </div>
        </div>
    </div>

    <div x-show="isModalOpen" style="display: none;" class="fixed inset-0 z-50 flex items-center justify-center pointer-events-auto">
        <div x-show="isModalOpen" x-transition.opacity.duration.300ms class="fixed inset-0 bg-gray-900/60 backdrop-blur-md" @click="closeModal()"></div>
        
        <div x-show="isModalOpen" 
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-y-12 scale-95"
             x-transition:enter-end="opacity-100 translate-y-0 scale-100"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 translate-y-0 scale-100"
             x-transition:leave-end="opacity-0 translate-y-12 scale-95"
             class="relative bg-white rounded-[2rem] shadow-2xl w-full max-w-xl mx-4 overflow-hidden flex flex-col border border-white/20">
            
            <div class="px-8 py-6 border-b border-gray-100 flex justify-between items-center bg-gradient-to-r from-teal-50 to-white">
                <h3 class="text-xl font-extrabold text-teal-900 flex items-center">
                    <i data-lucide="send" class="w-5 h-5 mr-2 text-teal-600"></i>起草广播
                </h3>
                <button @click="closeModal()" class="text-teal-600/50 hover:text-teal-600 hover:bg-teal-100/50 p-2 rounded-xl transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <form @submit.prevent="submitForm" class="p-8 space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">通知标题 <span class="text-red-500">*</span></label>
                    <input type="text" x-model="formData.title" required placeholder="如：系统版本更新维护公告"
                        class="w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-teal-500 outline-none transition-all text-sm font-medium placeholder-gray-400">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">接收受众</label>
                    <div class="flex space-x-4">
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" x-model="formData.type" value="public" class="peer sr-only">
                            <div class="p-4 rounded-xl border-2 border-gray-100 peer-checked:border-teal-500 peer-checked:bg-teal-50 transition-all text-center group hover:bg-gray-50">
                                <i data-lucide="globe" class="w-6 h-6 mx-auto mb-1 text-gray-400 peer-checked:text-teal-600"></i>
                                <span class="text-sm font-bold text-gray-600 peer-checked:text-teal-700">全员公开</span>
                            </div>
                        </label>
                        <label class="flex-1 cursor-pointer opacity-50" title="当前仅演示全员广播">
                            <input type="radio" x-model="formData.type" value="private" disabled class="peer sr-only">
                            <div class="p-4 rounded-xl border-2 border-gray-100 transition-all text-center">
                                <i data-lucide="lock" class="w-6 h-6 mx-auto mb-1 text-gray-300"></i>
                                <span class="text-sm font-bold text-gray-400">指定私信</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">正文内容 <span class="text-red-500">*</span></label>
                    <textarea x-model="formData.content" rows="4" required placeholder="请清晰、准确地描述通知详情..."
                        class="w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-teal-500 outline-none transition-all text-sm resize-none placeholder-gray-400"></textarea>
                </div>

                <div class="pt-4 flex justify-end gap-3">
                    <button type="button" @click="closeModal()" class="px-6 py-3 bg-white border border-gray-200 text-gray-700 rounded-xl hover:bg-gray-50 transition-all text-sm font-bold">
                        取消丢弃
                    </button>
                    <button type="submit" :disabled="submitting"
                        class="px-6 py-3 bg-teal-600 hover:bg-teal-700 text-white rounded-xl transition-all shadow-xl shadow-teal-500/30 text-sm font-bold flex items-center disabled:opacity-70">
                        <i data-lucide="loader-2" x-show="submitting" class="w-4 h-4 mr-2 animate-spin"></i>
                        <span x-text="submitting ? '发送中...' : '立即广播'"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function notifyApp() {
            return {
                notifications: [],
                loading: true,
                isModalOpen: false,
                submitting: false,
                formData: { title: '', type: 'public', content: '' },

                async initNotify() {
                    await this.fetchData();
                },

                async fetchData() {
                    this.loading = true;
                    try {
                        const res = await window.API.getNotifications();
                        this.notifications = res.results || res || [];
                    } catch (error) {
                        console.error('Failed to load', error);
                    } finally {
                        this.loading = false;
                        this.$nextTick(() => lucide.createIcons());
                    }
                },

                closeModal() {
                    this.isModalOpen = false;
                    this.submitting = false;
                    this.formData = { title: '', type: 'public', content: '' };
                },

                async submitForm() {
                    this.submitting = true;
                    try {
                        await window.API.createNotification(this.formData);
                        this.closeModal();
                        await this.fetchData();
                    } catch (error) {
                        alert(error.message || '发布失败');
                        this.submitting = false;
                    }
                },

                async deleteNotify(id) {
                    if(!confirm("确定要删除这条历史记录吗？")) return;
                    try {
                        await window.API.deleteNotification(id);
                        this.notifications = this.notifications.filter(n => n.id !== id);
                    } catch (e) {
                        alert("删除失败");
                    }
                }
            }
        }
    </script>
</body>
</html>
