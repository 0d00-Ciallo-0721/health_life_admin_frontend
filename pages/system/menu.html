<div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
    <ul class="divide-y divide-gray-50">
        <template x-for="menu in menus" :key="menu.id">
            <li class="p-0">
                <div class="flex items-center justify-between px-6 py-4 bg-gray-50/50 hover:bg-gray-100/50 transition-colors">
                    <div class="flex items-center font-bold text-gray-800">
                        <i data-lucide="folder" class="w-4 h-4 mr-3 text-teal-500"></i>
                        <span x-text="menu.name"></span>
                        <span class="ml-3 px-2 py-0.5 text-xs text-gray-500 bg-gray-200 rounded" x-text="menu.permission_code"></span>
                    </div>
                    <div class="flex space-x-2">
                        </div>
                </div>
                <ul class="divide-y divide-gray-50 bg-white" x-show="menu.children && menu.children.length > 0">
                    <template x-for="child in menu.children" :key="child.id">
                        <div class="flex items-center justify-between px-6 py-3 pl-14 hover:bg-gray-50 transition-colors">
                            <div class="flex items-center text-sm text-gray-600">
                                <i data-lucide="corner-down-right" class="w-4 h-4 mr-3 text-gray-300"></i>
                                <span x-text="child.name"></span>
                                <span class="ml-3 px-2 py-0.5 text-[10px] text-gray-400 border border-gray-200 rounded" x-text="child.permission_code"></span>
                            </div>
                        </div>
                    </template>
                </ul>
            </li>
        </template>
    </ul>
</div>
