<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菜单树管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/api.js"></script>
</head>
<body class="bg-gray-50 p-4 sm:p-8 text-gray-800 font-sans min-h-screen" x-data="menuApp()" x-init="initData()">

    <div x-show="toast.show" x-transition.opacity
         class="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 flex items-center p-4 mb-4 text-sm text-green-800 border border-green-300 rounded-lg bg-green-50 shadow-md" style="display: none;">
        <i data-lucide="check-circle" class="w-5 h-5 mr-2"></i>
        <span class="font-medium" x-text="toast.message"></span>
    </div>

    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 border-b border-gray-200 pb-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight flex items-center gap-2">
                <i data-lucide="list-tree" class="w-6 h-6 text-indigo-600"></i>
                系统菜单设置
            </h1>
            <p class="text-sm text-gray-500 mt-1">管理系统左侧侧边栏的路由项与操作级权限标识 (Permission Code)。</p>
        </div>
        <div class="flex items-center gap-3">
            <button @click="openModal()" class="inline-flex justify-center items-center px-4 py-2 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 transition-colors">
                <i data-lucide="plus" class="w-4 h-4 mr-1.5"></i>新增主菜单
            </button>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="flex items-center px-6 py-3 bg-gray-50 border-b border-gray-200">
            <div class="flex-1 text-xs font-medium text-gray-500 uppercase tracking-wider">菜单名称</div>
            <div class="w-48 text-xs font-medium text-gray-500 uppercase tracking-wider hidden md:block">权限标识 (Code)</div>
            <div class="w-48 text-xs font-medium text-gray-500 uppercase tracking-wider hidden lg:block">路由路径 (Path)</div>
            <div class="w-20 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">排序</div>
            <div class="w-32 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">操作</div>
        </div>

        <ul class="divide-y divide-gray-100" x-show="!loading">
            <tr x-show="menus.length === 0">
                <td colspan="5" class="p-8 text-center text-gray-400">暂无菜单数据</td>
            </tr>

            <template x-for="menu in menus" :key="menu.id || menu._id">
                <li>
                    <div class="flex items-center px-6 py-3 hover:bg-gray-50 transition-colors">
                        <div class="flex-1 flex items-center font-bold text-gray-900 text-sm">
                            <i data-lucide="folder" class="w-4 h-4 mr-2 text-indigo-400"></i>
                            <span x-text="menu.name || menu.title"></span>
                        </div>
                        <div class="w-48 text-xs text-gray-500 font-mono bg-gray-100 px-2 py-0.5 rounded border border-gray-200 truncate hidden md:block" x-text="menu.permission_code || '-'"></div>
                        <div class="w-48 text-xs text-gray-500 truncate hidden lg:block" x-text="menu.path || '-'"></div>
                        <div class="w-20 text-center text-xs text-gray-400" x-text="menu.sort_order || 0"></div>
                        <div class="w-32 text-right">
                            <button @click="openModal(menu)" class="text-indigo-600 hover:text-indigo-900 text-xs font-medium mr-2">编辑</button>
                            <button @click="deleteItem(menu)" class="text-red-600 hover:text-red-900 text-xs font-medium">删除</button>
                        </div>
                    </div>

                    <ul class="divide-y divide-gray-50 bg-gray-50/50" x-show="menu.children && menu.children.length > 0">
                        <template x-for="child in menu.children" :key="child.id || child._id">
                            <div class="flex items-center px-6 py-2 hover:bg-gray-100 transition-colors">
                                <div class="flex-1 flex items-center font-medium text-gray-700 text-sm pl-8 border-l-2 border-gray-200 ml-2">
                                    <i data-lucide="file-text" class="w-3.5 h-3.5 mr-2 text-gray-400"></i>
                                    <span x-text="child.name || child.title"></span>
                                </div>
                                <div class="w-48 text-xs text-gray-500 font-mono truncate hidden md:block" x-text="child.permission_code || '-'"></div>
                                <div class="w-48 text-xs text-gray-500 truncate hidden lg:block" x-text="child.path || '-'"></div>
                                <div class="w-20 text-center text-xs text-gray-400" x-text="child.sort_order || 0"></div>
                                <div class="w-32 text-right">
                                    <button @click="openModal(child)" class="text-indigo-600 hover:text-indigo-900 text-xs font-medium mr-2">编辑</button>
                                    <button @click="deleteItem(child)" class="text-red-600 hover:text-red-900 text-xs font-medium">删除</button>
                                </div>
                            </div>
                        </template>
                    </ul>
                </li>
            </template>
        </ul>
        
        <div class="p-6 text-center text-sm text-gray-500 bg-blue-50 border-t border-gray-200">
            <i data-lucide="info" class="w-4 h-4 inline mr-1 -mt-0.5 text-blue-500"></i>
            提示：若需一键生成默认系统路由树，请联络后端管理员执行 <code class="text-rose-500 bg-white border border-rose-200 px-1.5 py-0.5 rounded shadow-sm">python manage.py init_menus</code>。
        </div>
    </div>

    <div x-show="isModalOpen" style="display: none;" class="fixed z-10 inset-0 overflow-y-auto" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div x-show="isModalOpen" @click="closeModal()" x-transition.opacity class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen">&#8203;</span>
            
            <div x-show="isModalOpen" x-transition class="inline-block align-bottom bg-white rounded-xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <h3 class="text-lg leading-6 font-bold text-gray-900 mb-4 border-b pb-2 flex items-center">
                        <i data-lucide="list-tree" class="w-5 h-5 mr-2 text-indigo-600"></i>
                        <span x-text="isEditing ? '编辑菜单' : '新增菜单'"></span>
                    </h3>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">父级菜单</label>
                            <select x-model="formData.parent" class="block w-full border border-gray-300 rounded-md py-2 px-3 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                                <option value="">-- 作为根菜单 (顶级) --</option>
                                <template x-for="parentMenu in menus" :key="parentMenu.id">
                                    <option x-show="parentMenu.id !== formData.id" :value="parentMenu.id" x-text="parentMenu.name"></option>
                                </template>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">菜单名称 <span class="text-red-500">*</span></label>
                            <input type="text" x-model="formData.name" placeholder="如: 用户管理" class="block w-full border border-gray-300 rounded-md py-2 px-3 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                        </div>

                        <div class="flex gap-4">
                            <div class="flex-1">
                                <label class="block text-sm font-medium text-gray-700 mb-1">路由路径 (Path)</label>
                                <input type="text" x-model="formData.path" placeholder="如: /business/users" class="block w-full border border-gray-300 rounded-md py-2 px-3 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                            </div>
                            <div class="flex-1">
                                <label class="block text-sm font-medium text-gray-700 mb-1">组件 (Component)</label>
                                <input type="text" x-model="formData.component" placeholder="如: pages/users" class="block w-full border border-gray-300 rounded-md py-2 px-3 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                            </div>
                        </div>

                        <div class="flex gap-4">
                            <div class="flex-1">
                                <label class="block text-sm font-medium text-gray-700 mb-1">权限标识 (Code)</label>
                                <input type="text" x-model="formData.permission_code" placeholder="如: business:user:list" class="block w-full border border-gray-300 rounded-md py-2 px-3 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm font-mono text-xs">
                            </div>
                            <div class="w-24">
                                <label class="block text-sm font-medium text-gray-700 mb-1">排序规则</label>
                                <input type="number" x-model.number="formData.sort_order" class="block w-full border border-gray-300 rounded-md py-2 px-3 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse border-t border-gray-200">
                    <button type="button" @click="submitForm()" :disabled="submitting" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-indigo-600 text-base font-medium text-white hover:bg-indigo-700 sm:ml-3 sm:w-auto sm:text-sm disabled:opacity-50">
                        <span x-show="!submitting">保存提交</span>
                        <span x-show="submitting" class="flex items-center"><i data-lucide="loader-2" class="w-4 h-4 animate-spin mr-2"></i>处理中...</span>
                    </button>
                    <button type="button" @click="closeModal()" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function menuApp() {
            return {
                menus: [],
                loading: false,
                isModalOpen: false,
                isEditing: false,
                submitting: false,
                toast: { show: false, message: '' },
                
                // 表单数据模型
                formData: { 
                    id: null, 
                    name: '', 
                    path: '', 
                    component: '', 
                    permission_code: '', 
                    sort_order: 0, 
                    parent: '' 
                },
                
                async initData() {
                    this.loading = true;
                    try {
                        const res = await window.API.getAllMenus();
                        this.menus = res?.data?.list || res?.data || res?.results || [];
                    } catch(e) {
                        console.error('菜单加载失败', e);
                    } finally {
                        this.loading = false;
                        this.$nextTick(() => lucide.createIcons());
                    }
                },
                
                openModal(menu = null) {
                    if (menu) {
                        this.isEditing = true;
                        this.formData = {
                            id: menu.id || menu._id,
                            name: menu.name || menu.title || '',
                            path: menu.path || '',
                            component: menu.component || '',
                            permission_code: menu.permission_code || '',
                            sort_order: menu.sort_order || 0,
                            // 兼容数字 0 或 null 等无父级的情况
                            parent: menu.parent || ''
                        };
                    } else {
                        this.isEditing = false;
                        this.formData = { id: null, name: '', path: '', component: '', permission_code: '', sort_order: 0, parent: '' };
                    }
                    this.isModalOpen = true;
                    this.$nextTick(() => lucide.createIcons());
                },

                closeModal() {
                    this.isModalOpen = false;
                    this.submitting = false;
                },

                async submitForm() {
                    // 表单校验
                    if (!this.formData.name.trim()) return alert("请填写菜单名称");

                    this.submitting = true;
                    try {
                        // 构建提交负载
                        const payload = {
                            name: this.formData.name.trim(),
                            path: this.formData.path.trim(),
                            component: this.formData.component.trim(),
                            permission_code: this.formData.permission_code.trim(),
                            sort_order: Number(this.formData.sort_order) || 0,
                            // 如果 parent 为空字符串，则提交为 null 表示顶级菜单
                            parent: this.formData.parent === '' ? null : Number(this.formData.parent)
                        };

                        if (this.isEditing) {
                            await window.API.updateMenu(this.formData.id, payload);
                        } else {
                            await window.API.createMenu(payload);
                        }
                        
                        this.closeModal();
                        this.showToast(this.isEditing ? '菜单已更新' : '菜单已创建');
                        await this.initData(); // 刷新列表
                    } catch (e) {
                        console.error('保存失败:', e);
                        alert('保存失败: ' + (e.message || '未知错误'));
                        this.submitting = false;
                    }
                },

                async deleteItem(menu) {
                    if (!confirm(`确定要移除菜单 [${menu.name}] 吗？此操作可能会影响后台显示。`)) return;
                    try {
                        await window.API.deleteMenu(menu.id || menu._id);
                        this.showToast('菜单已移除');
                        await this.initData();
                    } catch(e) { 
                        alert('删除失败: ' + (e.message || '未知错误')); 
                    }
                },

                showToast(msg) {
                    this.toast.message = msg;
                    this.toast.show = true;
                    setTimeout(() => { this.toast.show = false; }, 3000);
                }
            }
        }
    </script>
</body>
</html>
