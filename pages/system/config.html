<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统参数配置</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../assets/js/api.js"></script>
</head>
<body class="bg-transparent p-2 sm:p-6 text-gray-800 font-sans" x-data="configApp()" x-init="initConfigs()">

    <div class="flex justify-between items-end mb-8 border-b border-gray-200 pb-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight">全局系统配置</h1>
            <p class="text-sm text-gray-500 mt-1">管理系统核心运转的动态参数 (如积分规则、版本控制等)。</p>
        </div>
        <button @click="openModal()" class="flex items-center px-4 py-2 bg-teal-600 hover:bg-teal-700 text-white rounded-xl text-sm font-medium transition-all shadow-lg shadow-teal-500/30">
            <i data-lucide="plus" class="w-4 h-4 mr-1.5"></i>新增变量
        </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <template x-for="config in configs" :key="config.id">
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 relative group transition-all hover:shadow-md hover:border-teal-100">
                <div class="flex justify-between items-start mb-4">
                    <div class="px-2.5 py-1 bg-gray-50 text-gray-500 text-xs font-mono rounded-md border border-gray-200" x-text="config.key"></div>
                    <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button @click="openModal(config)" class="text-gray-400 hover:text-teal-600"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                        <button @click="deleteConfig(config.id)" class="text-gray-400 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                </div>
                <h3 class="text-lg font-bold text-gray-900 mb-1" x-text="config.value"></h3>
                <p class="text-sm text-gray-500 leading-relaxed" x-text="config.description || '暂无描述信息'"></p>
            </div>
        </template>
    </div>

    <div x-show="isModalOpen" style="display: none;" class="fixed inset-0 z-50 flex items-center justify-center pointer-events-auto">
        <div x-show="isModalOpen" x-transition.opacity class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm" @click="closeModal()"></div>
        
        <div x-show="isModalOpen" x-transition class="relative bg-white rounded-3xl shadow-2xl w-full max-w-md mx-4 overflow-hidden flex flex-col">
            <div class="px-6 py-5 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <h3 class="text-lg font-bold text-gray-900" x-text="isEditing ? '编辑参数' : '新增全局参数'"></h3>
                <button @click="closeModal()" class="text-gray-400 hover:text-gray-600"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>

            <form @submit.prevent="submitForm" class="p-6 space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">键名 (Key) <span class="text-red-500">*</span></label>
                    <input type="text" x-model="formData.key" required :disabled="isEditing" placeholder="例如: SYS_APP_VERSION"
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-teal-500 outline-none text-sm disabled:opacity-50">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">键值 (Value) <span class="text-red-500">*</span></label>
                    <input type="text" x-model="formData.value" required
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-teal-500 outline-none text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">描述说明</label>
                    <textarea x-model="formData.description" rows="3"
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-teal-500 outline-none text-sm resize-none"></textarea>
                </div>
                
                <div class="pt-4 flex justify-end gap-3 border-t border-gray-100">
                    <button type="button" @click="closeModal()" class="px-5 py-2.5 bg-white border border-gray-200 rounded-xl text-sm font-medium">取消</button>
                    <button type="submit" :disabled="submitting" class="px-5 py-2.5 bg-teal-600 text-white rounded-xl text-sm font-medium">保存配置</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function configApp() {
            return {
                configs: [],
                loading: true,
                isModalOpen: false,
                isEditing: false,
                submitting: false,
                formData: { id: null, key: '', value: '', description: '' },

                async initConfigs() {
                    await this.fetchConfigs();
                },

                async fetchConfigs() {
                    this.loading = true;
                    try {
                        const res = await window.API.getConfigs();
                        this.configs = res.results || res || [];
                    } catch (error) {
                        console.error(error);
                    } finally {
                        this.loading = false;
                        this.$nextTick(() => lucide.createIcons());
                    }
                },

                openModal(config = null) {
                    if(config) {
                        this.isEditing = true;
                        this.formData = JSON.parse(JSON.stringify(config));
                    } else {
                        this.isEditing = false;
                        this.formData = { id: null, key: '', value: '', description: '' };
                    }
                    this.isModalOpen = true;
                },

                closeModal() {
                    this.isModalOpen = false;
                },

                async submitForm() {
                    this.submitting = true;
                    try {
                        if(this.isEditing) {
                            await window.API.updateConfig(this.formData.id, this.formData);
                        } else {
                            await window.API.createConfig(this.formData);
                        }
                        this.closeModal();
                        await this.fetchConfigs();
                    } catch (error) {
                        alert('操作失败');
                    } finally {
                        this.submitting = false;
                    }
                },

                async deleteConfig(id) {
                    if(!confirm("确定要删除此配置项吗？")) return;
                    try {
                        await window.API.deleteConfig(id);
                        await this.fetchConfigs();
                    } catch (e) {
                        alert("删除失败");
                    }
                }
            }
        }
    </script>
</body>
</html>
