<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色权限管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/api.js"></script>
</head>
<body class="bg-transparent p-2 sm:p-6 text-gray-800 font-sans" x-data="roleApp()" x-init="initData()">

    <div class="flex justify-between items-end mb-6 border-b border-gray-200 pb-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight">角色与权限</h1>
            <p class="text-sm text-gray-500 mt-1">管理系统角色，并为其分配对应的菜单和操作权限。</p>
        </div>
        <button @click="openModal()" class="flex items-center px-4 py-2 bg-gray-900 text-white hover:bg-gray-800 rounded-xl text-sm font-medium transition-all shadow-lg">
            <i data-lucide="shield" class="w-4 h-4 mr-1.5"></i>新增角色
        </button>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <template x-for="role in roles" :key="role.id">
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 hover:border-teal-200 hover:shadow-md transition-all flex flex-col group relative">
                <div class="flex justify-between items-start mb-4">
                    <div class="w-12 h-12 rounded-2xl bg-teal-50 text-teal-600 flex items-center justify-center border border-teal-100">
                        <i data-lucide="award" class="w-6 h-6"></i>
                    </div>
                    <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity bg-white/80 backdrop-blur-sm rounded-lg p-1">
                        <button @click="openModal(role)" class="p-1.5 text-gray-400 hover:text-teal-600 rounded-md hover:bg-teal-50"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                        <button @click="deleteItem(role.id)" class="p-1.5 text-gray-400 hover:text-red-500 rounded-md hover:bg-red-50"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                </div>
                <h3 class="text-xl font-bold text-gray-900 mb-1" x-text="role.name"></h3>
                <p class="text-sm text-gray-500 mb-4 line-clamp-2 h-10" x-text="role.description || '暂无详细描述'"></p>
                
                <div class="mt-auto pt-4 border-t border-gray-50 flex items-center justify-between text-xs text-gray-400">
                    <span class="flex items-center"><i data-lucide="clock" class="w-3 h-3 mr-1"></i> <span x-text="window.Utils ? window.Utils.formatDate(role.created_at) : ''"></span></span>
                    <span class="px-2.5 py-1 bg-gray-50 rounded-md border border-gray-100" x-text="(role.menus ? role.menus.length : 0) + ' 项权限'"></span>
                </div>
            </div>
        </template>
    </div>

    <div x-show="isModalOpen" style="display: none;" class="fixed inset-0 z-50 flex items-center justify-center pointer-events-auto">
        <div x-show="isModalOpen" x-transition.opacity class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm" @click="closeModal()"></div>
        
        <div x-show="isModalOpen" x-transition class="relative bg-white rounded-3xl shadow-2xl w-full max-w-md mx-4 flex flex-col overflow-hidden">
            <div class="px-6 py-5 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <h3 class="text-lg font-bold text-gray-900" x-text="isEditing ? '编辑角色配置' : '创建新角色'"></h3>
                <button @click="closeModal()" class="text-gray-400 hover:text-gray-600"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>

            <form @submit.prevent="submitForm" class="p-6 space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">角色名称 <span class="text-red-500">*</span></label>
                    <input type="text" x-model="formData.name" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-teal-500 focus:bg-white transition-all text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">角色描述</label>
                    <textarea x-model="formData.description" rows="3" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-teal-500 focus:bg-white transition-all text-sm resize-none"></textarea>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5 flex justify-between">
                        分配菜单/权限 ID
                        <span class="text-xs text-gray-400 font-normal">逗号分隔</span>
                    </label>
                    <input type="text" x-model="menusString" placeholder="例如: 1, 2, 5" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-teal-500 text-sm">
                </div>

                <div class="pt-4 flex justify-end gap-3 border-t border-gray-100">
                    <button type="button" @click="closeModal()" class="px-5 py-2.5 bg-white border border-gray-200 rounded-xl text-sm font-medium">取消</button>
                    <button type="submit" :disabled="submitting" class="px-5 py-2.5 bg-gray-900 hover:bg-gray-800 text-white rounded-xl text-sm font-medium flex items-center">
                        <i data-lucide="loader-2" x-show="submitting" class="w-4 h-4 mr-2 animate-spin"></i>
                        保存角色
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function roleApp() {
            return {
                roles: [],
                isModalOpen: false,
                isEditing: false,
                submitting: false,
                formData: { id: null, name: '', description: '', menus: [] },
                menusString: '', // 用于简易绑定

                async initData() {
                    try {
                        const res = await window.API.getRoles();
                        this.roles = res.results || res || [];
                        this.$nextTick(() => lucide.createIcons());
                    } catch (e) { console.error('Failed to load roles'); }
                },

                openModal(role = null) {
                    if (role) {
                        this.isEditing = true;
                        this.formData = JSON.parse(JSON.stringify(role));
                        this.menusString = (this.formData.menus || []).join(', ');
                    } else {
                        this.isEditing = false;
                        this.formData = { id: null, name: '', description: '', menus: [] };
                        this.menusString = '';
                    }
                    this.isModalOpen = true;
                },

                closeModal() { this.isModalOpen = false; this.submitting = false; },

                async submitForm() {
                    this.submitting = true;
                    // 处理简易字符串转数组
                    this.formData.menus = this.menusString.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
                    
                    try {
                        if (this.isEditing) await window.API.updateRole(this.formData.id, this.formData);
                        else await window.API.createRole(this.formData);
                        
                        this.closeModal();
                        await this.initData();
                    } catch (e) { 
                        alert(e.message || '操作失败'); 
                        this.submitting = false;
                    }
                },

                async deleteItem(id) {
                    if(!confirm("严重警告：确定要删除该角色吗？可能会影响现有用户的登录。")) return;
                    try {
                        await window.API.deleteRole(id);
                        await this.initData();
                    } catch (e) { alert("删除失败"); }
                }
            }
        }
    </script>
</body>
</html>
