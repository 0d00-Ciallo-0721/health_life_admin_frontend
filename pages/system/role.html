<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色权限管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/api.js"></script>
</head>
<body class="bg-gray-50 p-4 sm:p-8 text-gray-800 font-sans min-h-screen" x-data="roleApp()" x-init="initData()">

    <div x-show="toast.show" x-transition.opacity
         class="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 flex items-center p-4 mb-4 text-sm text-green-800 border border-green-300 rounded-lg bg-green-50 shadow-md" 
         style="display: none;">
        <i data-lucide="check-circle" class="w-5 h-5 mr-2"></i>
        <span class="font-medium" x-text="toast.message"></span>
    </div>

    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 border-b border-gray-200 pb-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight flex items-center gap-2">
                <i data-lucide="shield" class="w-6 h-6 text-indigo-600"></i>
                角色与权限管理
            </h1>
            <p class="text-sm text-gray-500 mt-1">配置系统角色，并为其分配可访问的菜单和操作权限标识 (Permission Code)。</p>
        </div>
        <button @click="openModal()" class="inline-flex justify-center items-center px-4 py-2 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none transition-colors">
            <i data-lucide="plus" class="w-4 h-4 mr-1.5"></i>
            新建角色
        </button>
    </div>

    <div class="bg-white shadow-sm rounded-lg overflow-hidden border border-gray-200">
        <div x-show="loading" class="p-12 text-center">
            <i data-lucide="loader-2" class="w-8 h-8 text-indigo-500 animate-spin mx-auto mb-4"></i>
            <p class="text-gray-500 text-sm">正在加载角色与权限配置...</p>
        </div>

        <table class="min-w-full divide-y divide-gray-200" x-show="!loading">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">角色标识 (Name)</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">角色描述</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">已分配菜单数</th>
                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                <tr x-show="roles.length === 0">
                    <td colspan="4" class="px-6 py-12 text-center text-gray-500">没有配置任何角色</td>
                </tr>
                <template x-for="role in roles" :key="role.id || role._id">
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2.5 py-1 inline-flex text-sm font-bold rounded-md bg-indigo-50 text-indigo-700 border border-indigo-100" x-text="role.name"></span>
                            <i data-lucide="crown" class="w-4 h-4 text-yellow-500 inline-block ml-1" x-show="role.name === 'super_admin'" title="系统内置超级管理员"></i>
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-600" x-text="role.description || '无描述'"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm">
                            <span class="font-medium text-gray-900" x-text="(role.menus || []).length"></span> 项权限
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <button @click="openModal(role)" class="text-indigo-600 hover:text-indigo-900 mr-4">编辑 / 分配权限</button>
                            <button @click="deleteItem(role)" x-show="role.name !== 'super_admin'" class="text-red-600 hover:text-red-900">删除</button>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <div x-show="isModalOpen" style="display: none;" class="fixed z-10 inset-0 overflow-y-auto" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div x-show="isModalOpen" @click="closeModal()" class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen">&#8203;</span>
            
            <div x-show="isModalOpen" class="inline-block align-bottom bg-white rounded-xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-2xl sm:w-full">
                <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <h3 class="text-lg leading-6 font-bold text-gray-900 mb-4 border-b pb-2" x-text="isEditing ? '编辑角色与权限' : '新增角色'"></h3>
                    
                    <div class="space-y-4">
                        <div class="flex gap-4">
                            <div class="flex-1">
                                <label class="block text-sm font-medium text-gray-700 mb-1">角色标识 (Role Name) <span class="text-red-500">*</span></label>
                                <input type="text" x-model="formData.name" :disabled="formData.name === 'super_admin'" placeholder="如: editor" class="block w-full border border-gray-300 rounded-md py-2 px-3 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm disabled:bg-gray-100">
                            </div>
                            <div class="flex-1">
                                <label class="block text-sm font-medium text-gray-700 mb-1">角色描述</label>
                                <input type="text" x-model="formData.description" placeholder="如: 内容审核编辑" class="block w-full border border-gray-300 rounded-md py-2 px-3 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                            </div>
                        </div>

                        <div class="mt-6">
                            <label class="block text-sm font-medium text-gray-900 mb-2">分配菜单与操作权限</label>
                            <div class="bg-gray-50 p-4 rounded-md border border-gray-200 max-h-64 overflow-y-auto">
                                <div class="grid grid-cols-1 gap-4">
                                    <template x-for="menu in allMenus" :key="menu.id">
                                        <div class="mb-2">
                                            <div class="flex items-start">
                                                <div class="flex items-center h-5">
                                                    <input type="checkbox" :id="'menu_'+menu.id" 
                                                           :checked="formData.menus.includes(menu.id)" 
                                                           @change="toggleMenu(menu.id)"
                                                           class="focus:ring-indigo-500 h-4 w-4 text-indigo-600 border-gray-300 rounded">
                                                </div>
                                                <div class="ml-3 text-sm">
                                                    <label :for="'menu_'+menu.id" class="font-bold text-gray-900 cursor-pointer" x-text="menu.name || menu.title"></label>
                                                </div>
                                            </div>
                                            <div class="ml-7 mt-2 grid grid-cols-1 sm:grid-cols-2 gap-2" x-show="menu.children && menu.children.length > 0">
                                                <template x-for="child in menu.children" :key="child.id">
                                                    <div class="flex items-start">
                                                        <div class="flex items-center h-5">
                                                            <input type="checkbox" :id="'menu_'+child.id" 
                                                                   :checked="formData.menus.includes(child.id)" 
                                                                   @change="toggleMenu(child.id)"
                                                                   class="focus:ring-indigo-500 h-4 w-4 text-indigo-600 border-gray-300 rounded">
                                                        </div>
                                                        <div class="ml-3 text-sm">
                                                            <label :for="'menu_'+child.id" class="font-medium text-gray-700 cursor-pointer" x-text="child.name || child.title"></label>
                                                            <p class="text-gray-500 text-xs font-mono mt-0.5" x-text="child.permission_code || child.path"></p>
                                                        </div>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                                <div x-show="allMenus.length === 0" class="text-xs text-gray-400">暂无菜单数据可供分配。</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse border-t border-gray-200">
                    <button type="button" @click="submitForm()" :disabled="submitting" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-indigo-600 text-base font-medium text-white hover:bg-indigo-700 sm:ml-3 sm:w-auto sm:text-sm disabled:opacity-50">
                        <span x-show="!submitting">保存配置</span>
                        <span x-show="submitting" class="flex items-center"><i data-lucide="loader-2" class="w-4 h-4 animate-spin mr-2"></i>保存中...</span>
                    </button>
                    <button type="button" @click="closeModal()" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function roleApp() {
            return {
                roles: [],
                allMenus: [], // 存放从 API 拿到的所有可选菜单树
                loading: false,
                isModalOpen: false,
                isEditing: false,
                submitting: false,
                toast: { show: false, message: '' },
                
                formData: { id: null, name: '', description: '', menus: [] },

                // 步骤 1：使用 Promise.all 同时获取角色列表和菜单字典
                async initData() {
                    this.loading = true;
                    try {
                        const [rolesRes, menusRes] = await Promise.all([
                            window.API.getRoles().catch(() => ({ data: [] })),
                            window.API.getAllMenus().catch(() => ({ data: [] }))
                        ]);
                        
                        this.roles = rolesRes?.data?.list || rolesRes?.data || rolesRes?.results || [];
                        this.allMenus = menusRes?.data?.list || menusRes?.data || menusRes?.results || [];
                    } catch (e) {
                        console.error('加载系统配置失败:', e);
                        alert('加载系统配置失败: ' + e.message);
                    } finally {
                        this.loading = false;
                        this.$nextTick(() => lucide.createIcons());
                    }
                },

                // 步骤 2：表单绑定与数据回显
                openModal(role = null) {
                    if (role) {
                        this.isEditing = true;
                        this.formData = {
                            id: role.id || role._id,
                            name: role.name || '',
                            description: role.description || role.desc || '',
                            // 将已拥有的菜单 ID 深拷贝到数组中，供 checkbox 绑定
                            menus: Array.isArray(role.menus) ? [...role.menus] : [] 
                        };
                    } else {
                        this.isEditing = false;
                        this.formData = { id: null, name: '', description: '', menus: [] };
                    }
                    this.isModalOpen = true;
                },

                closeModal() {
                    this.isModalOpen = false;
                    this.submitting = false;
                },

                // 步骤 3：Checkbox 勾选状态切换逻辑
                toggleMenu(menuId) {
                    const idx = this.formData.menus.indexOf(menuId);
                    if (idx > -1) {
                        this.formData.menus.splice(idx, 1); // 移除
                    } else {
                        this.formData.menus.push(menuId); // 添加
                    }
                },

                // 提交表单 (PUT / POST)
                async submitForm() {
                    if (!this.formData.name.trim()) return alert("角色标识不能为空");
                    this.submitting = true;
                    
                    try {
                        const payload = {
                            name: this.formData.name.trim(),
                            description: this.formData.description.trim(),
                            menus: this.formData.menus // 提交菜单 ID 数组
                        };

                        if (this.isEditing) {
                            await window.API.updateRole(this.formData.id, payload);
                        } else {
                            await window.API.createRole(payload);
                        }
                        
                        this.closeModal();
                        this.showToast('角色配置已保存');
                        await this.initData(); // 刷新
                    } catch (e) { 
                        alert('保存失败: ' + (e.message || '未知错误')); 
                        this.submitting = false;
                    }
                },

                async deleteItem(role) {
                    if(!confirm(`严重警告：确定要删除角色 [${role.name}] 吗？此操作可能会导致部分用户失去访问权限。`)) return;
                    try {
                        await window.API.deleteRole(role.id || role._id);
                        this.showToast('角色已成功移除');
                        await this.initData();
                    } catch (e) { alert("删除失败: " + e.message); }
                },

                showToast(msg) {
                    this.toast.message = msg;
                    this.toast.show = true;
                    setTimeout(() => { this.toast.show = false; }, 3000);
                }
            }
        }
    </script>
</body>
</html>
