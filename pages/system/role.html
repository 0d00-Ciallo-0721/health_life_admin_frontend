<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>角色管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/api.js"></script>
</head>
<body class="bg-transparent p-2 sm:p-6 text-gray-800 font-sans" x-data="roleApp()" x-init="initData()">

    <div class="flex justify-between items-end mb-6 border-b border-gray-200 pb-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight">角色与权限</h1>
            <p class="text-sm text-gray-500 mt-1">创建管理员角色，并为其分配对应的菜单和操作权限。</p>
        </div>
        <button @click="openModal()" class="flex items-center px-4 py-2 bg-gray-900 text-white hover:bg-gray-800 rounded-xl text-sm font-medium transition-all shadow-lg">
            <i data-lucide="shield" class="w-4 h-4 mr-1.5"></i>新增角色
        </button>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <template x-for="role in roles" :key="role.id">
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 hover:border-gray-300 transition-all flex flex-col group">
                <div class="flex justify-between items-start mb-4">
                    <div class="w-10 h-10 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center">
                        <i data-lucide="award" class="w-5 h-5"></i>
                    </div>
                    <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button @click="openModal(role)" class="text-gray-400 hover:text-blue-600"><i data-lucide="settings" class="w-4 h-4"></i></button>
                        <button @click="deleteItem(role.id)" class="text-gray-400 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                </div>
                <h3 class="text-lg font-bold text-gray-900 mb-1" x-text="role.name"></h3>
                <p class="text-sm text-gray-500 mb-4 line-clamp-2" x-text="role.desc || '暂无描述'"></p>
                <div class="mt-auto pt-4 border-t border-gray-50 flex items-center justify-between text-xs text-gray-400">
                    <span x-text="'创建于 ' + window.Utils.formatDate(role.created_at)"></span>
                    <span class="px-2 py-1 bg-gray-100 rounded-md" x-text="(role.permissions ? role.permissions.length : 0) + ' 项权限'"></span>
                </div>
            </div>
        </template>
    </div>

    <script>
        function roleApp() {
            return {
                roles: [],
                isModalOpen: false, // 略去冗长的弹窗表单代码
                // ... 参考 Config / Restaurant 编写标准 CRUD 逻辑 ...
                async initData() {
                    try {
                        const res = await window.API.getRoles();
                        this.roles = res.results || res || [];
                        this.$nextTick(() => lucide.createIcons());
                    } catch (e) { alert('获取角色失败'); }
                },
                // ... openModal, submitForm 等略 ...
            }
        }
    </script>
</body>
</html>
