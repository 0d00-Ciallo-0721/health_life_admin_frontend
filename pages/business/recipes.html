<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菜谱审核</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../assets/js/api.js"></script>
    <style>
        /* 隐藏滚动条 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-transparent p-2 sm:p-6 text-gray-800 font-sans min-h-screen" x-data="recipeApp()" x-init="initRecipes()">

    <div class="flex justify-between items-end mb-8 border-b border-gray-200 pb-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight flex items-center">
                内容审核中心
                <span class="ml-3 px-2.5 py-0.5 rounded-full bg-orange-100 text-orange-600 text-xs font-medium border border-orange-200" x-show="recipes.length > 0">
                    <span x-text="recipes.length"></span> 待处理
                </span>
            </h1>
            <p class="text-sm text-gray-500 mt-2">审核用户上传的菜谱，通过后将自动发布至应用大厅并通知作者。</p>
        </div>
        
        <button @click="fetchRecipes" class="flex items-center px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50 hover:text-teal-600 transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-teal-500/20" :disabled="loading">
            <i data-lucide="refresh-cw" class="w-4 h-4 mr-2" :class="loading ? 'animate-spin' : ''"></i>
            刷新列表
        </button>
    </div>

    <div x-show="loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <template x-for="i in 8">
            <div class="bg-white rounded-2xl overflow-hidden border border-gray-100 shadow-sm animate-pulse">
                <div class="h-48 bg-gray-200"></div>
                <div class="p-5 space-y-4">
                    <div class="h-4 bg-gray-200 rounded w-3/4"></div>
                    <div class="h-3 bg-gray-100 rounded w-1/2"></div>
                    <div class="pt-4 flex justify-between gap-3">
                        <div class="h-10 bg-gray-100 rounded-xl w-1/2"></div>
                        <div class="h-10 bg-gray-100 rounded-xl w-1/2"></div>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <div x-show="!loading && recipes.length === 0" style="display: none;" class="flex flex-col items-center justify-center py-24 px-4 text-center bg-white rounded-2xl border border-gray-100 shadow-[0_4px_20px_rgb(0,0,0,0.02)]">
        <div class="w-20 h-20 bg-teal-50 rounded-full flex items-center justify-center mb-6">
            <i data-lucide="coffee" class="w-10 h-10 text-teal-500"></i>
        </div>
        <h3 class="text-lg font-bold text-gray-900 mb-2">做得好，队列已清空！</h3>
        <p class="text-gray-500 max-w-sm">目前没有需要审核的菜谱。您可以去喝杯咖啡，或者检查其他业务模块。</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-12">
        <template x-for="recipe in recipes" :key="recipe.id || recipe._id">
            <div x-transition:leave="transition ease-in duration-300"
                 x-transition:leave-start="opacity-100 scale-100"
                 x-transition:leave-end="opacity-0 scale-90"
                 class="group bg-white rounded-2xl overflow-hidden shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-gray-100/80 hover:shadow-[0_12px_30px_rgb(0,0,0,0.08)] transition-all duration-300 flex flex-col">
                
                <div class="relative h-48 overflow-hidden bg-gray-100">
                    <img :src="recipe.image_url || 'https://images.unsplash.com/photo-1495521821757-a1efb6729352?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80'" 
                         alt="Cover" 
                         class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700 ease-in-out">
                    
                    <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                    
                    <div class="absolute top-3 right-3 bg-white/90 backdrop-blur-sm px-2.5 py-1 rounded-full flex items-center shadow-sm">
                        <i data-lucide="clock" class="w-3 h-3 text-orange-500 mr-1"></i>
                        <span class="text-xs font-semibold text-gray-700" x-text="recipe.prep_time ? recipe.prep_time + ' 分钟' : '未定'"></span>
                    </div>
                </div>

                <div class="p-5 flex-1 flex flex-col">
                    <div class="flex-1">
                        <h3 class="text-lg font-bold text-gray-900 line-clamp-1 mb-1" x-text="recipe.name || '未命名菜谱'"></h3>
                        
                        <div class="flex items-center text-xs text-gray-500 mb-4 space-x-3">
                            <span class="flex items-center"><i data-lucide="flame" class="w-3.5 h-3.5 text-red-400 mr-1"></i> <span x-text="recipe.calories || '0'"></span> kcal</span>
                            <span class="flex items-center"><i data-lucide="leaf" class="w-3.5 h-3.5 text-emerald-500 mr-1"></i> <span x-text="recipe.tags ? recipe.tags[0] : '健康'"></span></span>
                        </div>
                        
                        <div class="flex items-center p-3 bg-gray-50/80 rounded-xl border border-gray-100/50">
                            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-teal-400 to-blue-500 text-white flex items-center justify-center text-xs font-bold shadow-sm">
                                <span x-text="(recipe.author_name || 'U')[0].toUpperCase()"></span>
                            </div>
                            <div class="ml-3 overflow-hidden">
                                <p class="text-xs font-medium text-gray-900 truncate" x-text="recipe.author_name || '匿名用户'"></p>
                                <p class="text-[10px] text-gray-400 truncate" x-text="'提交于 ' + formatDate(recipe.created_at)"></p>
                            </div>
                        </div>
                    </div>

                    <div class="mt-5 flex gap-3 pt-4 border-t border-gray-100">
                        <button @click="handleAudit(recipe, 'reject')" 
                                class="flex-1 py-2.5 bg-red-50 hover:bg-red-500 text-red-600 hover:text-white rounded-xl text-sm font-medium transition-all duration-200 flex items-center justify-center group/btn">
                            <i data-lucide="x" class="w-4 h-4 mr-1.5 group-hover/btn:scale-110 transition-transform"></i>
                            驳回
                        </button>
                        <button @click="handleAudit(recipe, 'pass')" 
                                class="flex-1 py-2.5 bg-emerald-50 hover:bg-emerald-500 text-emerald-600 hover:text-white rounded-xl text-sm font-medium transition-all duration-200 flex items-center justify-center group/btn shadow-sm shadow-emerald-500/10">
                            <i data-lucide="check" class="w-4 h-4 mr-1.5 group-hover/btn:scale-110 transition-transform"></i>
                            通过
                        </button>
                    </div>
                </div>

                <div x-show="recipe._isSubmitting" class="absolute inset-0 bg-white/80 backdrop-blur-sm z-10 flex flex-col justify-center items-center rounded-2xl">
                    <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-teal-500 mb-2"></i>
                    <span class="text-sm font-medium text-teal-600">处理中...</span>
                </div>
            </div>
        </template>
    </div>

    <div class="fixed bottom-6 right-6 z-50 pointer-events-none" x-show="toast.show" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 translate-y-4" style="display: none;">
        <div class="bg-gray-900/90 backdrop-blur-md text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center pointer-events-auto">
            <i data-lucide="check-circle-2" class="w-5 h-5 text-emerald-400 mr-3"></i>
            <span class="text-sm font-medium" x-text="toast.message"></span>
        </div>
    </div>

    <script>
        function recipeApp() {
            return {
                recipes: [],
                loading: true,
                toast: { show: false, message: '' },

                async initRecipes() {
                    await this.fetchRecipes();
                },

                async fetchRecipes() {
                    this.loading = true;
                    try {
                        const response = await window.API.getPendingRecipes();
                        // 初始化数据时，附加一个本地 UI 状态 _isSubmitting 用于控制单卡片 loading
                        this.recipes = (response.data || []).map(r => ({ ...r, _isSubmitting: false }));
                    } catch (error) {
                        console.error('获取菜谱失败:', error);
                        this.showToast('获取数据失败，请重试');
                    } finally {
                        this.loading = false;
                        this.$nextTick(() => lucide.createIcons());
                    }
                },

                async handleAudit(recipe, result) {
                    const actionName = result === 'pass' ? '通过' : '驳回';
                    if (!confirm(`确定要${actionName}菜谱《${recipe.name || '未命名'}》吗？`)) return;

                    recipe._isSubmitting = true; // 开启卡片遮罩

                    try {
                        // 如果后端主键是 _id 或者是 id，需要兼容处理
                        const targetId = recipe.id || recipe._id;
                        await window.API.auditRecipe(targetId, result);
                        
                        // 成功后：利用动画平滑移除数组元素
                        this.showToast(`已${actionName}该菜谱`);
                        
                        // 延迟 300ms 移除，让用户看清“处理中”和过渡动画
                        setTimeout(() => {
                            this.recipes = this.recipes.filter(r => (r.id || r._id) !== targetId);
                        }, 300);

                    } catch (error) {
                        console.error('审核操作失败:', error);
                        alert(error.message || '操作失败');
                        recipe._isSubmitting = false;
                    }
                },

                showToast(msg) {
                    this.toast.message = msg;
                    this.toast.show = true;
                    setTimeout(() => { this.toast.show = false; }, 3000);
                },

                formatDate(dateString) {
                    if (!dateString) return '刚刚';
                    const date = new Date(dateString);
                    return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }) + ' ' + 
                           date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute:'2-digit' });
                }
            }
        }
    </script>
</body>
</html>
