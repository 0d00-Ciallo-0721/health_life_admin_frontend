<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菜谱内容审核</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/api.js"></script>
    <style>
        /* 定义移除时的淡出动画 */
        .fade-out {
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease-out;
        }
    </style>
</head>
<body class="bg-gray-50 p-4 sm:p-8 text-gray-800 font-sans min-h-screen" x-data="recipesApp()" x-init="initRecipes()">

    <div x-show="toast.show" x-transition 
         class="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 flex items-center p-4 mb-4 text-sm text-green-800 border border-green-300 rounded-lg bg-green-50 shadow-md" 
         role="alert" style="display: none;">
        <i data-lucide="check-circle" class="w-5 h-5 mr-2"></i>
        <span class="font-medium" x-text="toast.message"></span>
    </div>

    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 border-b border-gray-200 pb-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight flex items-center gap-2">
                <i data-lucide="shield-check" class="w-6 h-6 text-orange-500"></i>
                内容审核中心
                <span class="ml-3 px-2.5 py-0.5 rounded-full bg-orange-100 text-orange-600 text-xs font-medium border border-orange-200">
                    菜谱专区
                </span>
            </h1>
            <p class="text-sm text-gray-500 mt-1">审核用户 UGC 提交的自定义菜谱内容，维护平台健康数据质量。</p>
        </div>
        
        <div class="bg-white px-4 py-2 rounded-lg border border-gray-200 shadow-sm flex items-center gap-3">
            <div class="text-sm text-gray-500">待处理任务</div>
            <div class="text-xl font-bold text-orange-600" x-text="recipes.length">0</div>
        </div>
    </div>

    <div class="bg-white shadow-sm rounded-lg overflow-hidden border border-gray-200">
        <div x-show="loading" class="p-12 text-center">
            <i data-lucide="loader-2" class="w-8 h-8 text-orange-500 animate-spin mx-auto mb-4"></i>
            <p class="text-gray-500 text-sm">正在拉取待审核列队...</p>
        </div>

        <table class="min-w-full divide-y divide-gray-200" x-show="!loading">
            <thead class="bg-gray-50">
                <tr>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-24">主图预览</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">菜谱信息</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">热量估算</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">上传者</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">提交时间</th>
                    <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider w-48">审核决策</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                <tr x-show="recipes.length === 0">
                    <td colspan="6" class="px-6 py-16 text-center text-gray-500">
                        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-green-50 mb-4">
                            <i data-lucide="check" class="w-8 h-8 text-green-500"></i>
                        </div>
                        <p class="text-lg font-medium text-gray-900">干得漂亮！</p>
                        <p class="text-sm text-gray-500 mt-1">当前没有需要处理的待审核菜谱了。</p>
                    </td>
                </tr>

                <template x-for="recipe in recipes" :key="recipe.id || recipe._id">
                    <tr class="hover:bg-gray-50 transition-all duration-300" :class="{ 'opacity-50 pointer-events-none': recipe._isSubmitting }">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <img :src="recipe.image_url || 'https://via.placeholder.com/150?text=No+Image'" 
                                 class="h-16 w-16 rounded-lg object-cover border border-gray-200 shadow-sm"
                                 alt="Recipe Image"
                                 onerror="this.src='https://via.placeholder.com/150?text=Error'">
                        </td>
                        
                        <td class="px-6 py-4">
                            <div class="text-sm font-bold text-gray-900" x-text="recipe.name"></div>
                            <div class="text-xs text-gray-500 mt-1 max-w-xs truncate" :title="recipe.description" x-text="recipe.description || '无详细描述'"></div>
                            <div class="flex flex-wrap gap-1 mt-2" x-show="recipe.tags && recipe.tags.length">
                                <template x-for="tag in recipe.tags" :key="tag">
                                    <span class="px-2 py-0.5 rounded text-[10px] bg-gray-100 text-gray-600" x-text="tag"></span>
                                </template>
                            </div>
                        </td>

                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center text-sm font-medium text-orange-600">
                                <i data-lucide="flame" class="w-4 h-4 mr-1"></i>
                                <span x-text="`${recipe.calories || 0} kcal`"></span>
                            </div>
                            <div class="text-xs text-gray-400 mt-1" x-text="`每 ${recipe.serving_size || '100g'}`"></div>
                        </td>

                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center">
                                <div class="h-8 w-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center font-bold text-xs uppercase"
                                     x-text="(recipe.author_name || recipe.author || 'U')[0]"></div>
                                <span class="ml-2 text-sm text-gray-900" x-text="recipe.author_name || recipe.author || '未知用户'"></span>
                            </div>
                        </td>

                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="formatDate(recipe.created_at)"></td>

                        <td class="px-6 py-4 whitespace-nowrap text-right font-medium">
                            <div class="flex justify-end gap-2">
                                <button @click="audit(recipe, 'rejected')" 
                                        :disabled="recipe._isSubmitting"
                                        class="inline-flex items-center px-3 py-1.5 border border-red-200 text-red-700 bg-red-50 hover:bg-red-100 rounded-md text-xs transition-colors focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-red-500">
                                    <i data-lucide="x" class="w-3.5 h-3.5 mr-1"></i> 驳回
                                </button>
                                <button @click="audit(recipe, 'approved')" 
                                        :disabled="recipe._isSubmitting"
                                        class="inline-flex items-center px-3 py-1.5 border border-green-200 text-green-700 bg-green-50 hover:bg-green-100 rounded-md text-xs transition-colors focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-green-500">
                                    <i data-lucide="check" class="w-3.5 h-3.5 mr-1"></i> 通过
                                </button>
                            </div>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <script>
        function recipesApp() {
            return {
                recipes: [],
                loading: false,
                toast: {
                    show: false,
                    message: ''
                },

                async initRecipes() {
                    await this.fetchPendingRecipes();
                },

                // 步骤 1 & 2：拉取并解析待审核菜谱列表
                async fetchPendingRecipes() {
                    this.loading = true;
                    try {
                        const payload = await window.API.getPendingRecipes();
                        const list = payload?.data?.list || payload?.data || payload?.results || [];
                        
                        // 注入前端状态控制字段 _isSubmitting
                        this.recipes = list.map(item => ({ ...item, _isSubmitting: false }));
                    } catch (error) {
                        console.error('获取待审核菜谱失败:', error);
                        alert('拉取队列失败: ' + (error.message || '未知错误'));
                    } finally {
                        this.loading = false;
                        this.$nextTick(() => lucide.createIcons());
                    }
                },

                // 步骤 3 & 4：执行审核决策
                async audit(recipe, result) {
                    const actionName = result === 'approved' ? '通过' : '驳回';
                    
                    // 防误触二次确认
                    if (!confirm(`确定要【${actionName}】菜谱《${recipe.name}》的发布申请吗？`)) return;

                    // 设置当前行为 Loading 状态
                    recipe._isSubmitting = true;

                    try {
                        // 兼容 MongoDB (_id) 或 MySQL (id) 的主键结构
                        const targetId = recipe.id || recipe._id;
                        
                        // 调用 POST /business/recipes/{id}/audit/
                        await window.API.auditRecipe(targetId, result);
                        
                        // 触发成功 Toast
                        this.showToast(`已${actionName}该菜谱`);
                        
                        // 延迟 300ms 移除当前行，给予用户视觉缓冲（平滑体验）
                        setTimeout(() => {
                            this.recipes = this.recipes.filter(r => (r.id || r._id) !== targetId);
                        }, 300);

                    } catch (error) {
                        console.error('审核操作失败:', error);
                        alert(error.message || '审核处理失败');
                        // 恢复状态
                        recipe._isSubmitting = false;
                    }
                },

                // 辅助方法：显示 Toast
                showToast(msg) {
                    this.toast.message = msg;
                    this.toast.show = true;
                    setTimeout(() => { this.toast.show = false; }, 3000);
                },

                // 辅助方法：时间格式化
                formatDate(dateString) {
                    if (!dateString) return '-';
                    const date = new Date(dateString);
                    return date.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' }) + ' ' + 
                           date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute:'2-digit' });
                }
            }
        }
    </script>
</body>
</html>
