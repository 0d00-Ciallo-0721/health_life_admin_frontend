<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社区动态审核</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/api.js"></script>
</head>
<body class="bg-gray-50 p-4 sm:p-8 text-gray-800 font-sans min-h-screen" x-data="feedsApp()" x-init="initData()">

    <div x-show="toast.show" x-transition.opacity.duration.300ms
         class="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 flex items-center p-4 mb-4 text-sm text-green-800 border border-green-300 rounded-lg bg-green-50 shadow-md" 
         style="display: none;">
        <i data-lucide="check-circle" class="w-5 h-5 mr-2"></i>
        <span class="font-medium" x-text="toast.message"></span>
    </div>

    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 border-b border-gray-200 pb-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight flex items-center gap-2">
                <i data-lucide="message-square-warning" class="w-6 h-6 text-indigo-500"></i>
                社区动态审核
                <span class="ml-3 px-2.5 py-0.5 rounded-full bg-indigo-100 text-indigo-600 text-xs font-medium border border-indigo-200">
                    UGC 巡查
                </span>
            </h1>
            <p class="text-sm text-gray-500 mt-1">查看用户发布的社区动态，对违规图文或不良言论进行即时下架处理。</p>
        </div>

        <div class="relative w-full sm:w-80 flex gap-2">
            <div class="relative flex-1">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                <input type="text" 
                       x-model="searchQuery" 
                       @keydown.enter="fetchData()"
                       placeholder="搜索动态内容或发布者..." 
                       class="w-full pl-9 pr-4 py-2 bg-white border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 shadow-sm transition-all">
            </div>
            <button @click="fetchData()" class="px-4 py-2 bg-indigo-600 text-white rounded-md text-sm font-medium hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 shadow-sm transition-colors">
                搜索
            </button>
        </div>
    </div>

    <div class="bg-white shadow-sm rounded-lg overflow-hidden border border-gray-200">
        <div x-show="loading" class="p-12 text-center">
            <i data-lucide="loader-2" class="w-8 h-8 text-indigo-500 animate-spin mx-auto mb-4"></i>
            <p class="text-gray-500 text-sm">正在检索社区动态...</p>
        </div>

        <table class="min-w-full divide-y divide-gray-200" x-show="!loading">
            <thead class="bg-gray-50">
                <tr>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-1/3">动态内容</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">配图 / 媒体</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">发布者</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">互动数据</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">发布时间</th>
                    <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                <tr x-show="feeds.length === 0">
                    <td colspan="6" class="px-6 py-16 text-center text-gray-500">
                        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gray-50 mb-4">
                            <i data-lucide="inbox" class="w-8 h-8 text-gray-400"></i>
                        </div>
                        <p class="text-lg font-medium text-gray-900">未找到动态</p>
                        <p class="text-sm text-gray-500 mt-1">当前搜索条件下没有匹配的社区动态。</p>
                    </td>
                </tr>

                <template x-for="feed in feeds" :key="feed.id || feed._id">
                    <tr class="hover:bg-gray-50 transition-all duration-200" :class="{ 'opacity-50 pointer-events-none': feed._isDeleting }">
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="px-2 py-0.5 text-[10px] font-semibold rounded bg-gray-100 text-gray-600" x-text="getTypeName(feed.type || feed.feed_type)"></span>
                            </div>
                            <div class="text-sm text-gray-900 line-clamp-3 whitespace-normal break-words" :title="feed.content" x-text="feed.content || '无文字内容'"></div>
                        </td>

                        <td class="px-6 py-4 whitespace-nowrap">
                            <template x-if="feed.images && feed.images.length > 0">
                                <div class="flex gap-1 relative">
                                    <img :src="feed.images[0]" class="h-12 w-12 rounded object-cover border border-gray-200 shadow-sm" alt="Feed Image">
                                    <div x-show="feed.images.length > 1" class="absolute -top-2 -right-2 bg-gray-800 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full shadow">
                                        +<span x-text="feed.images.length - 1"></span>
                                    </div>
                                </div>
                            </template>
                            <template x-if="!feed.images || feed.images.length === 0">
                                <span class="text-xs text-gray-400 italic">无配图</span>
                            </template>
                        </td>

                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center">
                                <div class="h-8 w-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-xs uppercase"
                                     x-text="(feed.author_name || feed.author || 'U')[0]"></div>
                                <div class="ml-3">
                                    <div class="text-sm font-medium text-gray-900" x-text="feed.author_name || feed.author || '未知用户'"></div>
                                </div>
                            </div>
                        </td>

                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center gap-3 text-sm text-gray-500">
                                <div class="flex items-center gap-1" title="点赞数">
                                    <i data-lucide="heart" class="w-4 h-4 text-rose-400"></i>
                                    <span x-text="feed.likes_count || 0"></span>
                                </div>
                                <div class="flex items-center gap-1" title="评论数">
                                    <i data-lucide="message-circle" class="w-4 h-4 text-blue-400"></i>
                                    <span x-text="feed.comments_count || 0"></span>
                                </div>
                            </div>
                        </td>

                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="formatDate(feed.created_at)"></td>

                        <td class="px-6 py-4 whitespace-nowrap text-right font-medium">
                            <button @click="deleteFeed(feed)" 
                                    :disabled="feed._isDeleting"
                                    class="inline-flex items-center px-3 py-1.5 border border-red-200 text-red-700 bg-red-50 hover:bg-red-100 rounded-md text-xs transition-colors focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-red-500 disabled:opacity-50">
                                <i data-lucide="trash-2" class="w-3.5 h-3.5 mr-1" x-show="!feed._isDeleting"></i>
                                <i data-lucide="loader-2" class="w-3.5 h-3.5 mr-1 animate-spin" x-show="feed._isDeleting"></i>
                                下架违规内容
                            </button>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <script>
        function feedsApp() {
            return {
                feeds: [],
                loading: false,
                searchQuery: '',
                toast: {
                    show: false,
                    message: ''
                },

                async initData() {
                    await this.fetchData();
                },

                // 步骤 1 & 2：拉取动态列表
                async fetchData() {
                    this.loading = true;
                    try {
                        const payload = await window.API.getFeeds(this.searchQuery);
                        // 数据归一化，兼容 MongoDB 返回的数据包裹结构
                        const list = payload?.data?.list || payload?.data || payload?.results || [];
                        
                        // 注入前端状态控制字段
                        this.feeds = list.map(item => ({ ...item, _isDeleting: false }));
                    } catch (error) {
                        console.error('获取动态失败:', error);
                        alert('拉取动态列表失败: ' + (error.message || '请检查网络'));
                    } finally {
                        this.loading = false;
                        this.$nextTick(() => lucide.createIcons());
                    }
                },

                // 步骤 3 & 4：执行下架 (DELETE) 操作
                async deleteFeed(feed) {
                    // 原生 Confirm 拦截防误触
                    if (!confirm('【高危操作】确定要强制下架这条违规动态吗？\n注意：同时会级联删除其下的所有评论！')) return;

                    feed._isDeleting = true;

                    try {
                        // 兼容 MongoDB (_id) 或 MySQL (id) 的主键结构
                        const targetId = feed.id || feed._id;
                        
                        // 调用 DELETE 接口
                        await window.API.deleteFeed(targetId);
                        
                        // 触发成功 Toast 并刷新列表
                        this.showToast('违规动态已成功下架！');
                        await this.fetchData();
                        
                    } catch (error) {
                        console.error('下架操作失败:', error);
                        alert(error.message || '下架处理失败');
                        feed._isDeleting = false;
                    }
                },

                // 辅助方法：动态类型映射
                getTypeName(type) {
                    const map = { 
                        'post': '图文动态', 
                        'recipe': '菜谱分享', 
                        'restaurant': '探店打卡',
                        'achievement': '成就解锁'
                    };
                    return map[type] || '普通动态';
                },

                // 辅助方法：显示 Toast
                showToast(msg) {
                    this.toast.message = msg;
                    this.toast.show = true;
                    setTimeout(() => { this.toast.show = false; }, 3000);
                },

                // 辅助方法：时间格式化
                formatDate(dateString) {
                    if (!dateString) return '-';
                    const date = new Date(dateString);
                    return date.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' }) + ' ' + 
                           date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute:'2-digit' });
                }
            }
        }
    </script>
</body>
</html>
