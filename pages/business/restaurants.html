<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>商家库管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/api.js"></script>
</head>
<body class="bg-transparent p-2 sm:p-6 text-gray-800 font-sans" x-data="restaurantApp()" x-init="initData()">

    <div class="flex justify-between items-end mb-6 border-b border-gray-200 pb-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight">健康餐厅 LBS 库</h1>
            <p class="text-sm text-gray-500 mt-1">管理系统推荐的周边健康饮食商家数据。</p>
        </div>
        <button @click="openModal()" class="flex items-center px-4 py-2 bg-teal-600 hover:bg-teal-700 text-white rounded-xl text-sm font-medium transition-all shadow-lg shadow-teal-500/30">
            <i data-lucide="plus" class="w-4 h-4 mr-1.5"></i>新增商家
        </button>
    </div>

    <div class="relative w-full sm:w-80 mb-6">
        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
        <input type="text" x-model="searchQuery" @keyup.debounce.500ms="fetchData()"
            class="w-full pl-10 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500 outline-none transition-all shadow-sm text-sm"
            placeholder="搜索餐厅名称...">
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden relative">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-gray-50/50 text-gray-400 text-xs uppercase tracking-wider border-b border-gray-100">
                    <th class="px-6 py-4 font-semibold">餐厅名称</th>
                    <th class="px-6 py-4 font-semibold">人均消费</th>
                    <th class="px-6 py-4 font-semibold">地址</th>
                    <th class="px-6 py-4 font-semibold text-right">操作</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-50">
                <template x-for="item in restaurants" :key="item.id || item._id">
                    <tr class="hover:bg-gray-50/50 transition-colors">
                        <td class="px-6 py-4 font-medium text-gray-900" x-text="item.name"></td>
                        <td class="px-6 py-4 text-sm text-gray-500" x-text="'¥ ' + (item.avg_price || 0)"></td>
                        <td class="px-6 py-4 text-sm text-gray-500 truncate max-w-xs" x-text="item.address || '暂无详细地址'"></td>
                        <td class="px-6 py-4 text-right">
                            <button @click="openModal(item)" class="p-2 text-gray-400 hover:text-teal-600"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                            <button @click="deleteItem(item.id || item._id)" class="p-2 text-gray-400 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <div x-show="isModalOpen" style="display: none;" class="fixed inset-0 z-50 flex items-center justify-center">
        <div class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm" @click="closeModal()"></div>
        <div class="relative bg-white rounded-3xl shadow-2xl w-full max-w-lg mx-4 flex flex-col">
            <div class="px-6 py-5 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <h3 class="text-lg font-bold text-gray-900" x-text="isEditing ? '编辑商家' : '新增商家'"></h3>
                <button @click="closeModal()" class="text-gray-400 hover:text-gray-600"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <form @submit.prevent="submitForm" class="p-6 space-y-4">
                <div><label class="block text-sm font-medium text-gray-700 mb-1.5">餐厅名称 *</label>
                    <input type="text" x-model="formData.name" required class="w-full px-4 py-2 border rounded-xl outline-none focus:ring-2 focus:ring-teal-500"></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1.5">详细地址</label>
                    <input type="text" x-model="formData.address" class="w-full px-4 py-2 border rounded-xl outline-none focus:ring-2 focus:ring-teal-500"></div>
                <div class="flex justify-end gap-3 pt-4">
                    <button type="button" @click="closeModal()" class="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-xl">取消</button>
                    <button type="submit" class="px-5 py-2.5 bg-teal-600 text-white rounded-xl shadow-md">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function restaurantApp() {
            return {
                restaurants: [],
                searchQuery: '',
                isModalOpen: false,
                isEditing: false,
                formData: { id: null, name: '', address: '', avg_price: 0 },

                async initData() { await this.fetchData(); },

                async fetchData() {
                    try {
                        const res = await window.API.getRestaurants(this.searchQuery);
                        this.restaurants = res.data || res.results || [];
                        this.$nextTick(() => lucide.createIcons());
                    } catch (e) { alert('加载失败'); }
                },

                openModal(item = null) {
                    if (item) {
                        this.isEditing = true;
                        this.formData = JSON.parse(JSON.stringify(item));
                        this.formData.id = item.id || item._id; 
                    } else {
                        this.isEditing = false;
                        this.formData = { id: null, name: '', address: '', avg_price: 0 };
                    }
                    this.isModalOpen = true;
                },
                closeModal() { this.isModalOpen = false; },

                async submitForm() {
                    try {
                        if (this.isEditing) await window.API.updateRestaurant(this.formData.id, this.formData);
                        else await window.API.createRestaurant(this.formData);
                        this.closeModal();
                        await this.fetchData();
                    } catch (e) { alert('保存失败'); }
                },

                async deleteItem(id) {
                    if(!confirm("确认删除该商家？")) return;
                    try {
                        await window.API.deleteRestaurant(id);
                        await this.fetchData();
                    } catch (e) { alert('删除失败'); }
                }
            }
        }
    </script>
</body>
</html>
