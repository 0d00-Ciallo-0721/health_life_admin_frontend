<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商家库管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/api.js"></script>
</head>
<body class="bg-gray-50 p-4 sm:p-8 text-gray-800 font-sans min-h-screen" x-data="restaurantApp()" x-init="initData()">

    <div x-show="toast.show" x-transition.opacity.duration.300ms
         class="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 flex items-center p-4 mb-4 text-sm text-green-800 border border-green-300 rounded-lg bg-green-50 shadow-md" 
         style="display: none;">
        <i data-lucide="check-circle" class="w-5 h-5 mr-2"></i>
        <span class="font-medium" x-text="toast.message"></span>
    </div>

    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 border-b border-gray-200 pb-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight flex items-center gap-2">
                <i data-lucide="store" class="w-6 h-6 text-teal-600"></i>
                健康餐厅 LBS 库
            </h1>
            <p class="text-sm text-gray-500 mt-1">管理系统推荐的周边健康饮食商家数据，支撑小程序的地理位置服务。</p>
        </div>

        <div class="flex flex-col sm:flex-row items-center gap-3 w-full sm:w-auto">
            <div class="relative w-full sm:w-64">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                <input type="text" 
                       x-model="searchQuery" 
                       @keydown.enter="fetchData()"
                       placeholder="搜索餐厅名称或地址..." 
                       class="w-full pl-9 pr-4 py-2 bg-white border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500 shadow-sm transition-all">
            </div>
            
            <button @click="openModal()" class="w-full sm:w-auto inline-flex justify-center items-center px-4 py-2 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-teal-600 hover:bg-teal-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500 transition-colors">
                <i data-lucide="plus" class="w-4 h-4 mr-1.5"></i>
                新增商家
            </button>
        </div>
    </div>

    <div class="bg-white shadow-sm rounded-lg overflow-hidden border border-gray-200">
        <div x-show="loading" class="p-12 text-center">
            <i data-lucide="loader-2" class="w-8 h-8 text-teal-500 animate-spin mx-auto mb-4"></i>
            <p class="text-gray-500 text-sm">正在加载商家数据...</p>
        </div>

        <table class="min-w-full divide-y divide-gray-200" x-show="!loading">
            <thead class="bg-gray-50">
                <tr>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">餐厅名称 / 标签</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">地理位置 (LBS)</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">人均消费</th>
                    <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                <tr x-show="items.length === 0">
                    <td colspan="4" class="px-6 py-12 text-center text-gray-500">
                        <i data-lucide="map" class="w-12 h-12 text-gray-300 mx-auto mb-3"></i>
                        没有找到匹配的餐厅数据
                    </td>
                </tr>

                <template x-for="item in items" :key="item.id || item._id">
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4">
                            <div class="text-sm font-bold text-gray-900" x-text="item.name"></div>
                            <div class="flex flex-wrap gap-1 mt-1.5" x-show="item.tags && item.tags.length">
                                <template x-for="tag in item.tags" :key="tag">
                                    <span class="px-2 py-0.5 rounded text-[10px] font-medium bg-emerald-50 text-emerald-600 border border-emerald-100" x-text="tag"></span>
                                </template>
                            </div>
                        </td>

                        <td class="px-6 py-4">
                            <div class="flex items-start text-sm text-gray-900">
                                <i data-lucide="map-pin" class="w-4 h-4 text-gray-400 mr-1 mt-0.5 shrink-0"></i>
                                <span x-text="item.address || '暂无详细地址'"></span>
                            </div>
                            <div class="text-xs text-gray-400 mt-1 pl-5 font-mono" x-show="item.latitude && item.longitude">
                                Lat: <span x-text="item.latitude"></span>, Lng: <span x-text="item.longitude"></span>
                            </div>
                        </td>

                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="text-sm font-medium text-amber-600" x-show="item.avg_price">
                                ¥<span x-text="item.avg_price"></span>
                            </span>
                            <span class="text-sm text-gray-400" x-show="!item.avg_price">-</span>
                        </td>

                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <button @click="openModal(item)" class="text-indigo-600 hover:text-indigo-900 mr-4 transition-colors">编辑</button>
                            <button @click="deleteItem(item)" class="text-red-600 hover:text-red-900 transition-colors">删除</button>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <div x-show="isModalOpen" style="display: none;" class="fixed z-10 inset-0 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div x-show="isModalOpen" @click="closeModal()" x-transition.opacity class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen">&#8203;</span>
            
            <div x-show="isModalOpen" x-transition class="inline-block align-bottom bg-white rounded-xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-xl sm:w-full">
                <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <div class="flex items-center gap-3 mb-5 border-b pb-3">
                        <div class="bg-teal-100 p-2 rounded-full">
                            <i data-lucide="store" class="w-5 h-5 text-teal-600"></i>
                        </div>
                        <h3 class="text-lg leading-6 font-medium text-gray-900" id="modal-title" x-text="isEditing ? '编辑餐厅信息' : '新增餐厅入驻'"></h3>
                    </div>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">餐厅名称 <span class="text-red-500">*</span></label>
                            <input type="text" x-model="formData.name" placeholder="如：Wagas 沃歌斯" class="block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-teal-500 focus:border-teal-500 sm:text-sm">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">详细地址 <span class="text-red-500">*</span></label>
                            <input type="text" x-model="formData.address" placeholder="如：上海市徐汇区某某路123号" class="block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-teal-500 focus:border-teal-500 sm:text-sm">
                        </div>

                        <div class="flex gap-4">
                            <div class="flex-1">
                                <label class="block text-sm font-medium text-gray-700 mb-1">纬度 (Latitude) <span class="text-red-500">*</span></label>
                                <input type="number" step="0.000001" x-model.number="formData.latitude" placeholder="如: 31.230416" class="block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-teal-500 focus:border-teal-500 sm:text-sm font-mono">
                            </div>
                            <div class="flex-1">
                                <label class="block text-sm font-medium text-gray-700 mb-1">经度 (Longitude) <span class="text-red-500">*</span></label>
                                <input type="number" step="0.000001" x-model.number="formData.longitude" placeholder="如: 121.473701" class="block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-teal-500 focus:border-teal-500 sm:text-sm font-mono">
                            </div>
                        </div>

                        <div class="flex gap-4">
                            <div class="flex-1">
                                <label class="block text-sm font-medium text-gray-700 mb-1">特色标签 (逗号分隔)</label>
                                <input type="text" x-model="formData.tagsInput" placeholder="如: 低脂,减脂餐,轻食" class="block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-teal-500 focus:border-teal-500 sm:text-sm">
                            </div>
                            <div class="w-32">
                                <label class="block text-sm font-medium text-gray-700 mb-1">人均消费 (¥)</label>
                                <input type="number" x-model.number="formData.avg_price" placeholder="如: 65" class="block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-amber-500 focus:border-amber-500 sm:text-sm">
                            </div>
                        </div>
                        <p class="text-xs text-gray-400">经纬度信息用于小程序端测距和门店导航推荐，请尽量保证精确。</p>
                    </div>
                </div>
                
                <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse border-t border-gray-200">
                    <button type="button" @click="submitForm()" :disabled="submitting" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-teal-600 text-base font-medium text-white hover:bg-teal-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500 sm:ml-3 sm:w-auto sm:text-sm disabled:opacity-50 transition-colors">
                        <span x-show="!submitting">保存提交</span>
                        <span x-show="submitting" class="flex items-center"><i data-lucide="loader-2" class="w-4 h-4 animate-spin mr-2"></i>处理中...</span>
                    </button>
                    <button type="button" @click="closeModal()" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm transition-colors">
                        取消
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function restaurantApp() {
            return {
                items: [],
                loading: false,
                searchQuery: '',
                toast: { show: false, message: '' },
                
                isModalOpen: false,
                isEditing: false,
                submitting: false,
                // 表单数据模型
                formData: { 
                    id: null, 
                    name: '', 
                    address: '', 
                    latitude: null, 
                    longitude: null, 
                    tagsInput: '', // 用于前端输入的字符串
                    avg_price: 0 
                },

                async initData() {
                    await this.fetchData();
                },

                // 步骤 1：加载商家数据
                async fetchData() {
                    this.loading = true;
                    try {
                        const payload = await window.API.getRestaurants(this.searchQuery);
                        const list = payload?.data?.list || payload?.data || payload?.results || [];
                        this.items = list;
                    } catch (e) {
                        console.error('获取商家失败:', e);
                        alert('获取商家失败: ' + (e.message || '未知错误'));
                    } finally {
                        this.loading = false;
                        this.$nextTick(() => lucide.createIcons());
                    }
                },

                // 打开模态框，处理数据回显
                openModal(item = null) {
                    if (item) {
                        this.isEditing = true;
                        // 处理 tags：如果是数组，转换为逗号分隔字符串回显
                        let tagsStr = '';
                        if (item.tags) {
                            tagsStr = Array.isArray(item.tags) ? item.tags.join(', ') : item.tags;
                        }
                        
                        this.formData = {
                            id: item.id || item._id, // 兼容 MongoDB 和 MySQL
                            name: item.name || '',
                            address: item.address || '',
                            latitude: item.latitude || null,
                            longitude: item.longitude || null,
                            tagsInput: tagsStr,
                            avg_price: item.avg_price || 0
                        };
                    } else {
                        this.isEditing = false;
                        this.formData = { id: null, name: '', address: '', latitude: null, longitude: null, tagsInput: '', avg_price: null };
                    }
                    this.isModalOpen = true;
                    this.$nextTick(() => lucide.createIcons());
                },

                closeModal() {
                    this.isModalOpen = false;
                    this.submitting = false;
                },

                // 步骤 3 & 4：拦截表单提交，执行 POST / PUT
                async submitForm() {
                    // 前端字段校验
                    if (!this.formData.name.trim()) return alert("请填写餐厅名称");
                    if (!this.formData.address.trim()) return alert("请填写详细地址");
                    if (!this.formData.latitude || !this.formData.longitude) return alert("请完整填写经纬度坐标");

                    this.submitting = true;
                    try {
                        // 构造发送给后端的 payload
                        const payloadData = {
                            name: this.formData.name.trim(),
                            address: this.formData.address.trim(),
                            latitude: parseFloat(this.formData.latitude),
                            longitude: parseFloat(this.formData.longitude),
                            avg_price: parseFloat(this.formData.avg_price) || 0,
                            // 将逗号分隔的字符串转换为数组过滤空值发送给后端
                            tags: this.formData.tagsInput.split(',')
                                      .map(t => t.trim())
                                      .filter(Boolean)
                        };

                        if (this.isEditing) {
                            await window.API.updateRestaurant(this.formData.id, payloadData);
                        } else {
                            await window.API.createRestaurant(payloadData);
                        }
                        
                        this.closeModal();
                        await this.fetchData(); // 提交成功后重新刷新列表
                        this.showToast(this.isEditing ? '商家信息已更新' : '商家已成功入驻');
                    } catch (e) {
                        console.error('保存失败:', e);
                        alert(e.message || '保存失败，请检查填写内容');
                        this.submitting = false;
                    }
                },

                // 删除商家逻辑
                async deleteItem(item) {
                    if (!confirm(`确定要移除餐厅 [${item.name}] 吗？此操作不可逆。`)) return;
                    try {
                        const targetId = item.id || item._id;
                        await window.API.deleteRestaurant(targetId);
                        this.showToast('商家已移除');
                        await this.fetchData();
                    } catch (e) {
                        alert('删除失败: ' + (e.message || '未知错误'));
                    }
                },

                // 显示 Toast
                showToast(msg) {
                    this.toast.message = msg;
                    this.toast.show = true;
                    setTimeout(() => { this.toast.show = false; }, 3000);
                }
            }
        }
    </script>
</body>
</html>
