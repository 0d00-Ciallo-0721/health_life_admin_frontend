<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成就字典管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../assets/js/api.js"></script>
</head>
<body class="bg-transparent p-2 sm:p-6 text-gray-800 font-sans" x-data="achievementsApp()" x-init="initData()">

    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight">成就管理</h1>
            <p class="text-sm text-gray-500 mt-1">管理系统中的荣誉徽章与成就字典。</p>
        </div>

        <div class="flex items-center gap-3 w-full sm:w-auto">
            <div class="relative w-full sm:w-64">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                <input type="text" x-model="searchQuery" @keyup.debounce.500ms="fetchData()"
                    class="w-full pl-10 pr-4 py-2 bg-white border border-gray-200 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none text-sm"
                    placeholder="搜索成就名称或代码...">
            </div>
            <button @click="openModal()" class="px-4 py-2 bg-teal-600 text-white rounded-lg text-sm font-medium hover:bg-teal-700 flex items-center shadow-sm">
                <i data-lucide="plus" class="w-4 h-4 mr-1"></i> 新增成就
            </button>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden relative">
        <div x-show="loading" class="absolute inset-0 bg-white/60 backdrop-blur-sm z-10 flex items-center justify-center">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-teal-600"></div>
        </div>

        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider border-b border-gray-100">
                    <th class="px-6 py-4 font-semibold">图标/名称</th>
                    <th class="px-6 py-4 font-semibold">唯一代码 (Code)</th>
                    <th class="px-6 py-4 font-semibold">成就描述</th>
                    <th class="px-6 py-4 font-semibold text-right">操作</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-50">
                <template x-for="item in list" :key="item.id">
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4">
                            <div class="flex items-center">
                                <div class="w-10 h-10 rounded-lg bg-gray-100 flex items-center justify-center overflow-hidden border border-gray-200">
                                    <template x-if="item.icon"><img :src="item.icon" class="w-full h-full object-cover"></template>
                                    <template x-if="!item.icon"><i data-lucide="award" class="w-5 h-5 text-gray-400"></i></template>
                                </div>
                                <span class="ml-4 text-sm font-medium text-gray-900" x-text="item.title"></span>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-600 font-mono" x-text="item.code"></td>
                        <td class="px-6 py-4 text-sm text-gray-500 max-w-xs truncate" x-text="item.desc"></td>
                        <td class="px-6 py-4 text-right space-x-2">
                            <button @click="openModal(item)" class="text-blue-600 hover:text-blue-800 p-1"><i data-lucide="edit" class="w-4 h-4"></i></button>
                            <button @click="deleteItem(item.id)" class="text-red-500 hover:text-red-700 p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </td>
                    </tr>
                </template>
                <tr x-show="!loading && list.length === 0">
                    <td colspan="4" class="px-6 py-12 text-center text-gray-500 text-sm">暂无成就数据</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div x-show="isModalOpen" class="fixed inset-0 z-50 overflow-y-auto" style="display: none;">
        <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:p-0">
            <div class="fixed inset-0 transition-opacity bg-gray-500 bg-opacity-75" @click="closeModal()"></div>
            <div class="relative inline-block align-bottom bg-white rounded-xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg w-full">
                <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <h3 class="text-lg leading-6 font-medium text-gray-900 mb-4" x-text="isEditing ? '编辑成就' : '新增成就'"></h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">成就名称</label>
                            <input type="text" x-model="form.title" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-teal-500 focus:border-teal-500 sm:text-sm border p-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">代码 (英文字母)</label>
                            <input type="text" x-model="form.code" :disabled="isEditing" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-teal-500 focus:border-teal-500 sm:text-sm border p-2 disabled:bg-gray-100">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">成就描述</label>
                            <textarea x-model="form.desc" rows="3" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-teal-500 focus:border-teal-500 sm:text-sm border p-2"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">图标 URL (可选)</label>
                            <input type="text" x-model="form.icon" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-teal-500 focus:border-teal-500 sm:text-sm border p-2">
                        </div>
                    </div>
                </div>
                <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                    <button @click="submitForm()" type="button" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-teal-600 text-base font-medium text-white hover:bg-teal-700 focus:outline-none sm:ml-3 sm:w-auto sm:text-sm">保存</button>
                    <button @click="closeModal()" type="button" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function achievementsApp() {
            return {
                list: [], loading: false, searchQuery: '',
                isModalOpen: false, isEditing: false, currentId: null,
                form: { title: '', code: '', desc: '', icon: '' },

                async initData() { await this.fetchData(); },

                async fetchData() {
                    this.loading = true;
                    try {
                        const res = await window.API.getAchievements(this.searchQuery);
                        this.list = res.data?.results || res.data || [];
                    } catch (e) { alert(e.message); } finally {
                        this.loading = false; this.$nextTick(() => lucide.createIcons());
                    }
                },

                openModal(item = null) {
                    if (item) {
                        this.isEditing = true; this.currentId = item.id;
                        this.form = { title: item.title, code: item.code, desc: item.desc, icon: item.icon || '' };
                    } else {
                        this.isEditing = false; this.currentId = null;
                        this.form = { title: '', code: '', desc: '', icon: '' };
                    }
                    this.isModalOpen = true;
                },

                closeModal() { this.isModalOpen = false; },

                async submitForm() {
                    try {
                        if (this.isEditing) await window.API.updateAchievement(this.currentId, this.form);
                        else await window.API.createAchievement(this.form);
                        this.closeModal();
                        await this.fetchData();
                    } catch (e) { alert('保存失败: ' + e.message); }
                },

                async deleteItem(id) {
                    if (!confirm('确定要删除该成就吗？')) return;
                    try {
                        await window.API.deleteAchievement(id);
                        await this.fetchData();
                    } catch (e) { alert('删除失败: ' + e.message); }
                }
            }
        }
    </script>
</body>
</html>
