<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/api.js"></script>
</head>
<body class="bg-gray-50 p-4 sm:p-8 text-gray-800 font-sans min-h-screen" x-data="usersApp()" x-init="initUsers()">

    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 border-b border-gray-200 pb-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight flex items-center gap-2">
                <i data-lucide="users" class="w-6 h-6 text-indigo-500"></i>
                用户管理
            </h1>
            <p class="text-sm text-gray-500 mt-1">查看和管理平台注册用户，控制账号状态与权限。</p>
        </div>

        <div class="relative w-full sm:w-80 flex gap-2">
            <div class="relative flex-1">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                <input type="text" 
                       x-model="searchQuery" 
                       @keydown.enter="fetchUsers()"
                       placeholder="搜索账号或昵称..." 
                       class="w-full pl-9 pr-4 py-2 bg-white border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 shadow-sm transition-all">
            </div>
            <button @click="fetchUsers()" class="px-4 py-2 bg-indigo-600 text-white rounded-md text-sm font-medium hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 shadow-sm transition-colors">
                搜索
            </button>
        </div>
    </div>

    <div class="bg-white shadow-sm rounded-lg overflow-hidden border border-gray-200">
        <div x-show="loading" class="p-12 text-center">
            <i data-lucide="loader-2" class="w-8 h-8 text-indigo-500 animate-spin mx-auto mb-4"></i>
            <p class="text-gray-500 text-sm">正在加载用户数据...</p>
        </div>

        <table class="min-w-full divide-y divide-gray-200" x-show="!loading">
            <thead class="bg-gray-50">
                <tr>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">用户信息</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">角色权限</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">健康目标</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">账号状态</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">注册时间</th>
                    <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                <tr x-show="users.length === 0">
                    <td colspan="6" class="px-6 py-12 text-center text-gray-500">
                        <i data-lucide="inbox" class="w-12 h-12 text-gray-300 mx-auto mb-3"></i>
                        没有找到匹配的用户
                    </td>
                </tr>

                <template x-for="user in users" :key="user.id">
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center">
                                <div class="flex-shrink-0 h-10 w-10">
                                    <img class="h-10 w-10 rounded-full object-cover border border-gray-200" 
                                         :src="user.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.nickname || user.username)}&background=random`" 
                                         alt="Avatar">
                                </div>
                                <div class="ml-4">
                                    <div class="text-sm font-medium text-gray-900" x-text="user.nickname || '未设置昵称'"></div>
                                    <div class="text-sm text-gray-500" x-text="'@' + user.username"></div>
                                </div>
                            </div>
                        </td>
                        
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex flex-wrap gap-1">
                                <template x-if="!user.roles || user.roles.length === 0">
                                    <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-gray-100 text-gray-600">普通用户</span>
                                </template>
                                <template x-for="role in user.roles" :key="role">
                                    <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full"
                                          :class="role === 'super_admin' ? 'bg-purple-100 text-purple-800' : 'bg-blue-100 text-blue-800'"
                                          x-text="role === 'super_admin' ? '超级管理员' : role">
                                    </span>
                                </template>
                            </div>
                        </td>

                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            <div x-text="user.goal_type || '-'"></div>
                            <div class="text-xs text-blue-500 mt-0.5" x-show="user.water_goal_cups" x-text="`日饮水: ${user.water_goal_cups}杯`"></div>
                        </td>

                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2.5 py-1 inline-flex text-xs leading-5 font-semibold rounded-full"
                                  :class="user.is_active ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'">
                                <span class="w-1.5 h-1.5 rounded-full mr-1.5 self-center" :class="user.is_active ? 'bg-green-500' : 'bg-red-500'"></span>
                                <span x-text="user.is_active ? '正常' : '已封禁'"></span>
                            </span>
                        </td>

                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="formatDate(user.date_joined)"></td>

                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <button @click="toggleStatus(user)" 
                                    class="inline-flex items-center px-3 py-1.5 border shadow-sm text-xs font-medium rounded-md focus:outline-none transition-colors"
                                    :class="user.is_active ? 'border-red-200 text-red-700 bg-red-50 hover:bg-red-100' : 'border-green-200 text-green-700 bg-green-50 hover:bg-green-100'">
                                <i :data-lucide="user.is_active ? 'ban' : 'check-circle'" class="w-3.5 h-3.5 mr-1.5"></i>
                                <span x-text="user.is_active ? '封禁账号' : '解封账号'"></span>
                            </button>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <script>
        function usersApp() {
            return {
                users: [],
                loading: false,
                searchQuery: '',

                async initUsers() {
                    await this.fetchUsers();
                },

                // Task 1: 列表拉取与解析
                async fetchUsers() {
                    this.loading = true;
                    try {
                        const payload = await window.API.getUsers(this.searchQuery);
                        // 数据归一化解析：兼容可能存在的 {data: {list}} 或直接返回数组的情况
                        const list = payload?.data?.list || payload?.data || payload?.results || [];
                        this.users = list;
                    } catch (error) {
                        console.error('获取用户列表失败:', error);
                        alert('获取用户列表失败: ' + (error.message || '未知错误'));
                    } finally {
                        this.loading = false;
                        // 重新渲染 Lucide 图标
                        this.$nextTick(() => lucide.createIcons());
                    }
                },

                // Task 2: 状态切换与安全防护
                async toggleStatus(user) {
                    const action = user.is_active ? '封禁' : '解封';
                    
                    // 步骤 2：二次确认拦截
                    if (!confirm(`确定要${action}用户 [${user.nickname || user.username}] 吗？此操作将立即生效。`)) return;

                    try {
                        // 步骤 3：调用 POST /business/users/{id}/toggle_status/
                        await window.API.toggleUserStatus(user.id);
                        
                        // 步骤 4：成功后重新拉取列表以确保状态同步（或直接做乐观更新）
                        await this.fetchUsers(); 
                        
                        // 补充 Success Toast 逻辑
                        if (typeof window.showToast === 'function') {
                            window.showToast(`${action}操作成功`, 'success');
                        }
                    } catch (error) {
                        console.error('状态修改失败:', error);
                        alert(error.message || '操作失败');
                    }
                },

                // 辅助函数：时间格式化
                formatDate(dateString) {
                    if (!dateString) return '-';
                    const date = new Date(dateString);
                    return date.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' }) + ' ' + 
                           date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute:'2-digit' });
                }
            }
        }
    </script>
</body>
</html>
