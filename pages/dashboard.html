<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../assets/js/api.js"></script>

    <style>
        body { scrollbar-width: none; -ms-overflow-style: none; }
        body::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-transparent p-2 sm:p-6 text-gray-800 font-sans" x-data="dashboardApp()" x-init="initDashboard()">

    <div x-show="loading" class="flex justify-center items-center h-64">
        <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-teal-500"></i>
    </div>

    <div x-show="!loading" style="display: none;" x-transition.opacity.duration.500ms>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <template x-for="(card, index) in summaryData.cards" :key="index">
                <div class="bg-white rounded-2xl p-6 shadow-[0_2px_10px_rgb(0,0,0,0.02)] border border-gray-100/80 hover:shadow-[0_8px_30px_rgb(0,0,0,0.06)] hover:-translate-y-1 transition-all duration-300 relative overflow-hidden group">
                    <div class="absolute -right-6 -top-6 w-24 h-24 rounded-full transition-transform duration-500 group-hover:scale-150 opacity-10"
                         :class="{
                            'bg-blue-500': card.icon === 'User',
                            'bg-orange-500': card.icon === 'Dish',
                            'bg-teal-500': card.icon === 'DataLine'
                         }"></div>
                    <div class="relative z-10 flex justify-between items-start">
                        <div>
                            <p class="text-sm font-medium text-gray-400 mb-1" x-text="card.title"></p>
                            <h3 class="text-3xl font-extrabold text-gray-800 tracking-tight" x-text="card.value"></h3>
                        </div>
                        <div class="p-3 rounded-xl"
                             :class="{
                                'bg-blue-50 text-blue-500': card.icon === 'User',
                                'bg-orange-50 text-orange-500': card.icon === 'Dish',
                                'bg-teal-50 text-teal-500': card.icon === 'DataLine'
                             }">
                            <template x-if="card.icon === 'User'"><i data-lucide="users" class="w-6 h-6"></i></template>
                            <template x-if="card.icon === 'Dish'"><i data-lucide="utensils-crossed" class="w-6 h-6"></i></template>
                            <template x-if="card.icon === 'DataLine'"><i data-lucide="activity" class="w-6 h-6"></i></template>
                        </div>
                    </div>
                    <div class="mt-4 pt-4 border-t border-gray-50 flex items-center text-sm relative z-10">
                        <template x-if="card.today_added !== undefined">
                            <div class="flex items-center text-gray-500">
                                <span class="text-emerald-500 flex items-center font-medium mr-2">
                                    <i data-lucide="trending-up" class="w-4 h-4 mr-1"></i>+<span x-text="card.today_added"></span>
                                </span>今日新增
                            </div>
                        </template>
                        <template x-if="card.action_needed !== undefined">
                            <div class="flex items-center text-gray-500">
                                <span class="text-amber-500 flex items-center font-medium mr-2" :class="{'text-amber-500': card.action_needed > 0, 'text-gray-400': card.action_needed === 0}">
                                    <i data-lucide="alert-circle" class="w-4 h-4 mr-1"></i><span x-text="card.action_needed"></span>
                                </span>待审核
                            </div>
                        </template>
                        <template x-if="card.today_added === undefined && card.action_needed === undefined">
                            <div class="text-gray-400 flex items-center">
                                <i data-lucide="check-circle-2" class="w-4 h-4 mr-1"></i> 实时更新
                            </div>
                        </template>
                    </div>
                </div>
            </template>
        </div>

        <div class="bg-white rounded-2xl p-6 shadow-[0_2px_10px_rgb(0,0,0,0.02)] border border-gray-100/80">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-lg font-bold text-gray-800">近7日活跃趋势</h2>
                    <p class="text-sm text-gray-400 mt-1">系统每日打卡记录总数</p>
                </div>
            </div>
            <div id="trendChart" class="w-full h-[350px]"></div>
        </div>

        <div class="mt-8">
            <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                <i data-lucide="activity-square" class="w-5 h-5 mr-2 text-rose-500"></i>
                今日健康观测日志
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-gradient-to-br from-blue-50 to-white rounded-2xl p-6 border border-blue-100 shadow-sm relative overflow-hidden">
                    <i data-lucide="droplets" class="absolute -right-4 -bottom-4 w-32 h-32 text-blue-500 opacity-5"></i>
                    <h3 class="text-sm font-semibold text-blue-800 mb-4">全站饮水达标率</h3>
                    <div class="flex items-end gap-3 mb-2">
                        <span class="text-4xl font-extrabold text-blue-600" x-text="(journalStats?.water_stats?.completion_rate_pct || 0) + '%'"></span>
                        <span class="text-sm text-blue-500 mb-1" x-text="`(${journalStats?.water_stats?.completed_users || 0} / ${journalStats?.water_stats?.total_users_logged || 0} 人)`"></span>
                    </div>
                    <p class="text-xs text-blue-400">今日全站累计已饮水 <span class="font-bold text-blue-500" x-text="journalStats?.water_stats?.total_cups_drank || 0"></span> 杯</p>
                </div>

                <div class="bg-gradient-to-br from-emerald-50 to-white rounded-2xl p-6 border border-emerald-100 shadow-sm relative overflow-hidden">
                    <i data-lucide="salad" class="absolute -right-4 -bottom-4 w-32 h-32 text-emerald-500 opacity-5"></i>
                    <h3 class="text-sm font-semibold text-emerald-800 mb-4">饮食记录活跃度</h3>
                    <div class="flex items-end gap-3 mb-2">
                        <span class="text-4xl font-extrabold text-emerald-600" x-text="journalStats?.intake_stats?.avg_records_per_user || 0"></span>
                        <span class="text-sm text-emerald-500 mb-1">餐 / 人均</span>
                    </div>
                    <p class="text-xs text-emerald-400">今日产生 <span class="font-bold text-emerald-500" x-text="journalStats?.intake_stats?.total_records || 0"></span> 条饮食记录</p>
                </div>
            </div>
        </div>

    </div>

    <script>
        function dashboardApp() {
            return {
                loading: true,
                summaryData: { cards: [], trend: [] },
                journalStats: null, // 🚀 新增状态
                chartInstance: null,

                async initDashboard() {
                    try {
                        const response = await window.API.getDashboard();
                        this.summaryData = response.data || response;
                        
                        // 🚀 修复点：调用统一封装的接口，带上完整的域名和 Token
                        try {
                            const journalRes = await window.API.getJournalStats();
                            this.journalStats = journalRes.data || journalRes;
                        } catch(e) { 
                            console.warn("未接入健康日志接口", e); 
                        }

                        this.$nextTick(() => {
                            lucide.createIcons();
                            this.renderChart();
                        });
                    } catch (error) {
                        this.mockDataForPreview();
                    } finally {
                        this.loading = false;
                    }

                    window.addEventListener('resize', () => {
                        if (this.chartInstance) this.chartInstance.resize();
                    });
                },

                renderChart() {
                    if (!this.summaryData.trend || this.summaryData.trend.length === 0) return;
                    const chartDom = document.getElementById('trendChart');
                    this.chartInstance = echarts.init(chartDom);
                    const xAxisData = this.summaryData.trend.map(item => item.date);
                    const seriesData = this.summaryData.trend.map(item => item.value);

                    const option = {
                        tooltip: { trigger: 'axis', backgroundColor: 'rgba(255, 255, 255, 0.9)', extraCssText: 'box-shadow: 0 4px 20px rgba(0,0,0,0.05); border-radius: 8px;' },
                        grid: { left: '2%', right: '4%', bottom: '3%', top: '10%', containLabel: true },
                        xAxis: { type: 'category', boundaryGap: false, data: xAxisData, axisLine: { show: false }, axisTick: { show: false }, axisLabel: { color: '#94a3b8', margin: 15 } },
                        yAxis: { type: 'value', splitLine: { lineStyle: { color: '#f1f5f9', type: 'dashed' } }, axisLabel: { color: '#94a3b8' } },
                        series: [{
                            name: '打卡数', type: 'line', smooth: true, showSymbol: false, symbolSize: 8,
                            itemStyle: { color: '#0d9488' },
                            lineStyle: { width: 3, shadowColor: 'rgba(13, 148, 136, 0.2)', shadowBlur: 10, shadowOffsetY: 5 },
                            areaStyle: {
                                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                    { offset: 0, color: 'rgba(20, 184, 166, 0.3)' },
                                    { offset: 1, color: 'rgba(20, 184, 166, 0.0)' }
                                ])
                            },
                            data: seriesData
                        }]
                    };
                    this.chartInstance.setOption(option);
                },

                mockDataForPreview() {
                    this.summaryData = {
                        cards: [
                            { title: "总用户数", value: 12450, today_added: 128, icon: "User" },
                            { title: "总菜谱数", value: 384, action_needed: 12, icon: "Dish" },
                            { title: "今日打卡数", value: 8902, icon: "DataLine" }
                        ],
                        trend: [ { date: "02-18", value: 7800 }, { date: "02-19", value: 8100 }, { date: "02-24", value: 8902 } ]
                    };
                    this.journalStats = {
                        water_stats: { completion_rate_pct: 68.5, completed_users: 120, total_users_logged: 175, total_cups_drank: 1450 },
                        intake_stats: { avg_records_per_user: 2.8, total_records: 3890 }
                    };
                    this.$nextTick(() => { lucide.createIcons(); this.renderChart(); });
                }
            }
        }
    </script>
</body>
</html>
