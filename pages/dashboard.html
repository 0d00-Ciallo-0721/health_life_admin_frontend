<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard 数据大盘</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/api.js"></script>

    <style>
        /* 隐藏滚动条但保留滚动功能 */
        body { scrollbar-width: none; -ms-overflow-style: none; }
        body::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 p-4 sm:p-8 text-gray-800 font-sans min-h-screen" x-data="dashboardApp()" x-init="initDashboard()">

    <div x-show="loading" class="fixed inset-0 z-50 flex items-center justify-center bg-white/70 backdrop-blur-sm">
        <div class="text-center">
            <i data-lucide="loader-2" class="w-10 h-10 animate-spin text-teal-600 mx-auto mb-4"></i>
            <p class="text-gray-600 font-medium">正在聚合全站大盘数据...</p>
        </div>
    </div>

    <div class="mb-8 border-b border-gray-200 pb-4" x-show="!loading" style="display: none;" x-transition.opacity.duration.500ms>
        <h1 class="text-2xl font-bold text-gray-900 tracking-tight flex items-center gap-2">
            <i data-lucide="layout-dashboard" class="w-6 h-6 text-teal-600"></i>
            运营数据中心 (Dashboard)
        </h1>
        <p class="text-sm text-gray-500 mt-1">实时监控健康生活平台的用户活跃度、留存转化及内容增长趋势。</p>
    </div>

    <div x-show="!loading" style="display: none;" x-transition.opacity.duration.500ms class="space-y-6">
        
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6">
            <template x-for="card in summaryData.cards" :key="card.title">
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 sm:p-6 hover:shadow-md transition-shadow relative overflow-hidden group">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-sm font-medium text-gray-500 mb-1" x-text="card.title"></p>
                            <h3 class="text-2xl sm:text-3xl font-bold text-gray-900" x-text="card.value.toLocaleString()"></h3>
                        </div>
                        <div class="p-2 sm:p-3 bg-teal-50 text-teal-600 rounded-lg group-hover:scale-110 transition-transform">
                            <i :data-lucide="card.icon || 'activity'" class="w-5 h-5 sm:w-6 sm:h-6"></i>
                        </div>
                    </div>
                    
                    <div class="mt-4 flex items-center text-sm">
                        <template x-if="card.today_added !== undefined">
                            <span class="flex items-center text-green-600 font-medium bg-green-50 px-2 py-0.5 rounded-full text-xs">
                                <i data-lucide="trending-up" class="w-3 h-3 mr-1"></i>
                                今日新增 <span x-text="card.today_added" class="ml-1"></span>
                            </span>
                        </template>
                        <template x-if="card.action_needed !== undefined">
                            <span class="flex items-center text-orange-600 font-medium bg-orange-50 px-2 py-0.5 rounded-full text-xs">
                                <i data-lucide="alert-circle" class="w-3 h-3 mr-1"></i>
                                待审核 <span x-text="card.action_needed" class="ml-1"></span>
                            </span>
                        </template>
                    </div>
                </div>
            </template>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-base font-bold text-gray-900">近七日核心数据趋势</h3>
                    <div class="text-xs text-gray-400">更新时间: <span x-text="new Date().toLocaleTimeString()"></span></div>
                </div>
                <div id="trendChart" class="w-full h-72"></div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex flex-col justify-between">
                <h3 class="text-base font-bold text-gray-900 mb-4">打卡与日志留存统计</h3>
                
                <div class="space-y-5">
                    <div>
                        <div class="flex justify-between text-sm mb-1">
                            <span class="text-gray-600 font-medium flex items-center"><i data-lucide="droplets" class="w-4 h-4 text-blue-500 mr-1.5"></i>饮水达标率</span>
                            <span class="font-bold text-gray-900" x-text="`${journalStats.water_stats?.completion_rate_pct || 0}%`"></span>
                        </div>
                        <div class="w-full bg-gray-100 rounded-full h-2">
                            <div class="bg-blue-500 h-2 rounded-full" :style="`width: ${journalStats.water_stats?.completion_rate_pct || 0}%`"></div>
                        </div>
                        <p class="text-xs text-gray-400 mt-1 text-right" x-text="`${journalStats.water_stats?.completed_users || 0} 人已达标`"></p>
                    </div>

                    <div>
                        <div class="flex justify-between text-sm mb-1">
                            <span class="text-gray-600 font-medium flex items-center"><i data-lucide="flame" class="w-4 h-4 text-orange-500 mr-1.5"></i>饮食记录率</span>
                            <span class="font-bold text-gray-900" x-text="`${journalStats.calorie_stats?.logging_rate_pct || 0}%`"></span>
                        </div>
                        <div class="w-full bg-gray-100 rounded-full h-2">
                            <div class="bg-orange-500 h-2 rounded-full" :style="`width: ${journalStats.calorie_stats?.logging_rate_pct || 0}%`"></div>
                        </div>
                        <p class="text-xs text-gray-400 mt-1 text-right" x-text="`累计摄入 ${journalStats.calorie_stats?.total_intake_kcal || 0} kcal`"></p>
                    </div>

                    <div>
                        <div class="flex justify-between text-sm mb-1">
                            <span class="text-gray-600 font-medium flex items-center"><i data-lucide="activity" class="w-4 h-4 text-emerald-500 mr-1.5"></i>运动达标率</span>
                            <span class="font-bold text-gray-900" x-text="`${journalStats.workout_stats?.completion_rate_pct || 0}%`"></span>
                        </div>
                        <div class="w-full bg-gray-100 rounded-full h-2">
                            <div class="bg-emerald-500 h-2 rounded-full" :style="`width: ${journalStats.workout_stats?.completion_rate_pct || 0}%`"></div>
                        </div>
                        <p class="text-xs text-gray-400 mt-1 text-right" x-text="`累计消耗 ${journalStats.workout_stats?.total_burned_kcal || 0} kcal`"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function dashboardApp() {
            return {
                loading: true,
                chartInstance: null,
                summaryData: { cards: [], trend: [] },
                journalStats: { water_stats: {}, calorie_stats: {}, workout_stats: {} },

                async initDashboard() {
                    this.loading = true;
                    try {
                        // 步骤 1：使用 Promise.all 并发无阻塞请求核心统计接口
                        const [dashRes, statRes] = await Promise.all([
                            window.API.getDashboard().catch(() => null), // 允许单一接口失败不影响全局
                            window.API.getJournalStats().catch(() => null)
                        ]);

                        // 步骤 2：安全解析数据并绑定至视图模型
                        if (dashRes) {
                            const dashData = dashRes.data || dashRes || {};
                            this.summaryData = {
                                cards: dashData.cards || [],
                                trend: dashData.trend || []
                            };
                        }

                        if (statRes) {
                            const statData = statRes.data || statRes || {};
                            this.journalStats = {
                                water_stats: statData.water_stats || {},
                                calorie_stats: statData.calorie_stats || {},
                                workout_stats: statData.workout_stats || {}
                            };
                        }

                        // 如果后端接口尚未完全开发完毕，执行智能降级，保证 UI 不白屏
                        this.applyFallbackDataIfEmpty();

                    } catch (error) {
                        console.error('仪表盘数据加载失败:', error);
                        this.applyFallbackDataIfEmpty();
                    } finally {
                        this.loading = false;
                        
                        // 步骤 3：数据挂载完毕后，初始化 Lucide 图标与 ECharts
                        this.$nextTick(() => {
                            lucide.createIcons();
                            this.renderCharts();
                        });
                    }
                },

                // 步骤 3：ECharts 图表渲染逻辑
                renderCharts() {
                    const chartDom = document.getElementById('trendChart');
                    if (!chartDom) return;
                    
                    if (!this.chartInstance) {
                        this.chartInstance = echarts.init(chartDom);
                    }

                    const trendData = this.summaryData.trend || [];
                    const xAxisData = trendData.map(item => item.date);
                    const seriesData = trendData.map(item => item.value);

                    const option = {
                        tooltip: { 
                            trigger: 'axis',
                            backgroundColor: 'rgba(255, 255, 255, 0.9)',
                            borderColor: '#f3f4f6',
                            textStyle: { color: '#1f2937' }
                        },
                        grid: { left: '2%', right: '4%', bottom: '3%', top: '10%', containLabel: true },
                        xAxis: {
                            type: 'category',
                            boundaryGap: false,
                            data: xAxisData,
                            axisLine: { lineStyle: { color: '#e5e7eb' } },
                            axisLabel: { color: '#6b7280', fontSize: 12 }
                        },
                        yAxis: {
                            type: 'value',
                            splitLine: { lineStyle: { color: '#f3f4f6', type: 'dashed' } },
                            axisLabel: { color: '#6b7280', fontSize: 12 }
                        },
                        series: [{
                            name: '活跃指标',
                            type: 'line',
                            smooth: true,
                            symbol: 'circle',
                            symbolSize: 8,
                            itemStyle: { color: '#0d9488', borderColor: '#ffffff', borderWidth: 2 },
                            lineStyle: { color: '#0d9488', width: 3 },
                            areaStyle: {
                                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                    { offset: 0, color: 'rgba(13, 148, 136, 0.25)' },
                                    { offset: 1, color: 'rgba(13, 148, 136, 0.02)' }
                                ])
                            },
                            data: seriesData
                        }]
                    };
                    
                    this.chartInstance.setOption(option);
                    
                    // 监听窗口大小变化自适应图表
                    window.addEventListener('resize', () => {
                        this.chartInstance && this.chartInstance.resize();
                    });
                },

                // 智能降级：只确保对象结构不报错，不再注入虚假 Mock 数据掩盖后端问题
                applyFallbackDataIfEmpty() {
                    if (!this.summaryData.cards || this.summaryData.cards.length === 0) {
                        this.summaryData.cards = [];
                    }
                    if (!this.summaryData.trend || this.summaryData.trend.length === 0) {
                        this.summaryData.trend = [];
                    }
                    if (Object.keys(this.journalStats.water_stats || {}).length === 0) {
                        this.journalStats.water_stats = { completion_rate_pct: 0, completed_users: 0 };
                    }
                    // 移除对未在文档中定义的 calorie_stats 和 workout_stats 的兜底
                    // UI 层已通过 ?. 和 || 0 避免 undefined 错误
                }
            }
        }
    </script>
</body>
</html>
