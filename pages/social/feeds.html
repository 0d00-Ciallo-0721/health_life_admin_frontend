<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社区动态审核</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-transparent p-2 sm:p-6 text-gray-800 font-sans" x-data="feedsApp()" x-init="initData()">

    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight">内容安全审核</h1>
            <p class="text-sm text-gray-500 mt-1">管理用户发布的社区动态，快速定位并处理违规内容。</p>
        </div>

        <div class="relative w-full sm:w-72">
            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
            <input type="text" x-model="searchQuery" @keyup.debounce.500ms="fetchFeeds()"
                class="w-full pl-10 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-rose-500 focus:border-transparent outline-none transition-all shadow-sm text-sm"
                placeholder="搜索动态内容关键词...">
        </div>
    </div>

    <div x-show="loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <template x-for="i in 6">
            <div class="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm animate-pulse">
                <div class="flex items-center space-x-3 mb-4">
                    <div class="w-10 h-10 bg-gray-200 rounded-full"></div>
                    <div class="space-y-2 flex-1">
                        <div class="h-4 bg-gray-200 rounded w-1/3"></div>
                        <div class="h-3 bg-gray-100 rounded w-1/4"></div>
                    </div>
                </div>
                <div class="h-20 bg-gray-100 rounded mb-4"></div>
                <div class="flex justify-between">
                    <div class="h-8 bg-gray-50 rounded w-20"></div>
                    <div class="h-8 bg-gray-50 rounded w-8"></div>
                </div>
            </div>
        </template>
    </div>

    <div x-show="!loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <template x-for="feed in feeds" :key="feed.id">
            <div class="bg-white rounded-2xl p-5 border border-gray-100 shadow-[0_2px_10px_rgb(0,0,0,0.02)] hover:shadow-lg transition-all flex flex-col justify-between group">
                
                <div>
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center space-x-3">
                            <img :src="feed.user_info?.avatar || `https://ui-avatars.com/api/?name=${feed.user_info?.nickname || 'User'}&background=random`" 
                                 class="w-10 h-10 rounded-full object-cover border border-gray-100">
                            <div>
                                <p class="text-sm font-bold text-gray-900" x-text="feed.user_info?.nickname || '匿名用户'"></p>
                                <p class="text-xs text-gray-500" x-text="formatDate(feed.created_at)"></p>
                            </div>
                        </div>
                        <span x-show="feed.is_hidden" class="px-2 py-1 bg-gray-100 text-gray-500 text-xs rounded-md border border-gray-200 flex items-center">
                            <i data-lucide="eye-off" class="w-3 h-3 mr-1"></i> 已隐藏
                        </span>
                    </div>

                    <p class="text-sm text-gray-700 mb-4 line-clamp-4 leading-relaxed" x-text="feed.content"></p>

                    <template x-if="feed.images && feed.images.length > 0">
                        <div class="grid grid-cols-3 gap-2 mb-4">
                            <template x-for="(img, idx) in feed.images.slice(0,3)" :key="idx">
                                <img :src="img" class="w-full h-20 object-cover rounded-lg border border-gray-100">
                            </template>
                            <div x-show="feed.images.length > 3" class="w-full h-20 bg-gray-100 rounded-lg flex items-center justify-center text-xs text-gray-500 font-medium">
                                +<span x-text="feed.images.length - 3"></span>
                            </div>
                        </div>
                    </template>
                </div>

                <div class="flex items-center justify-between pt-4 border-t border-gray-50 mt-2">
                    <div class="flex items-center space-x-4 text-gray-400 text-sm">
                        <span class="flex items-center"><i data-lucide="heart" class="w-4 h-4 mr-1"></i> <span x-text="feed.likes_count || 0"></span></span>
                        <span class="flex items-center"><i data-lucide="message-square" class="w-4 h-4 mr-1"></i> <span x-text="feed.comments_count || 0"></span></span>
                    </div>
                    
                    <div class="flex space-x-2 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button @click="hideFeed(feed)" class="p-2 text-gray-400 hover:text-orange-500 hover:bg-orange-50 rounded-lg transition-colors" title="隐藏(对用户不可见)">
                            <i data-lucide="eye-off" class="w-4 h-4"></i>
                        </button>
                        <button @click="deleteFeed(feed.id)" class="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors" title="彻底删除">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>

            </div>
        </template>
    </div>

    <div x-show="!loading && feeds.length === 0" class="py-20 flex flex-col items-center justify-center bg-white rounded-2xl border border-gray-100">
        <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mb-4">
            <i data-lucide="shield-check" class="w-10 h-10 text-gray-300"></i>
        </div>
        <p class="text-gray-500 text-sm">暂无违规或待审核动态，社区环境良好。</p>
    </div>

    <script>
        function feedsApp() {
            return {
                feeds: [],
                loading: true,
                searchQuery: '',

                async initData() {
                    await this.fetchFeeds();
                },

                async fetchFeeds() {
                    this.loading = true;
                    try {
                        const token = localStorage.getItem('access_token');
                        // 真实接口调用
                        // const res = await fetch(`/api/admin/v1/business/feeds/?search=${this.searchQuery}`, {
                        //     headers: { 'Authorization': `Bearer ${token}` }
                        // }).then(r => r.json());
                        // this.feeds = res.data.list || res.data;
                        
                        // Mock 数据供预览
                        this.feeds = [
                            { id: '65f1a2b3c4d5e6f7a8b9c0d1', user_info: { nickname: '减脂达人', avatar: '' }, content: '今天吃了欺骗餐，罪恶感拉满，不知道会不会反弹...推荐这家炸鸡店，真的太好吃了！', images: ['https://picsum.photos/200'], created_at: new Date().toISOString(), likes_count: 45, comments_count: 12, is_hidden: false },
                            { id: '65f1a2b3c4d5e6f7a8b9c0d2', user_info: { nickname: '营养师小王', avatar: '' }, content: '【广告】私教课程特惠，加我微信免费咨询减脂计划！', images: [], created_at: new Date(Date.now() - 86400000).toISOString(), likes_count: 2, comments_count: 0, is_hidden: false }
                        ];
                    } catch (e) {
                        console.error('获取动态失败', e);
                    } finally {
                        this.loading = false;
                        this.$nextTick(() => lucide.createIcons());
                    }
                },

                async deleteFeed(id) {
                    if (!confirm("确定要彻底删除该条动态吗？对应的评论也将一并删除。")) return;
                    try {
                        // await fetch(`/api/admin/v1/business/feeds/${id}/`, { method: 'DELETE', headers: { ... } });
                        this.feeds = this.feeds.filter(f => f.id !== id);
                        alert('删除成功');
                    } catch (e) { alert('删除失败'); }
                },

                async hideFeed(feed) {
                    if (!confirm("确定要隐藏该条动态吗？")) return;
                    feed.is_hidden = true;
                    this.$nextTick(() => lucide.createIcons());
                },

                formatDate(dateString) {
                    if (!dateString) return '';
                    const d = new Date(dateString);
                    return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' });
                }
            }
        }
    </script>
</body>
</html>
